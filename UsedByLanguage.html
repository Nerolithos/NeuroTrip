<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语言的边界 · The Limits of My Language</title>
<style>
  :root{
    --bg:#07080a;
    --warm:#ffd9a0;
    --warm-dim:#e6c89a;
    --cold:#3a4048;
    --ink:#f5f1e8;
    --ink-dim:#d8d1c4;
    --dead:#1a1c20;
    --new:#8ee6ff;
    --serif:"Songti SC","SimSun","Source Han Serif SC","Noto Serif CJK SC","Noto Serif SC",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-size:17px;
    font-family:var(--serif);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    text-shadow:0 0 10px rgba(248,237,212,.2);
  }
  #field,
  #vignette,
  #stage,
  #hud{
    transition:filter 1.35s cubic-bezier(.25,.8,.2,1), opacity 1.35s cubic-bezier(.25,.8,.2,1);
  }
  .ubl-experience.ubl-exit #field,
  .ubl-experience.ubl-exit #vignette,
  .ubl-experience.ubl-exit #stage,
  .ubl-experience.ubl-exit #hud,
  body.ubl-exit #field,
  body.ubl-exit #vignette,
  body.ubl-exit #stage,
  body.ubl-exit #hud{
    filter:blur(14px);
    opacity:.16;
  }
  #field{position:fixed;inset:0;z-index:0;display:block}
  #vignette{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(ellipse at 50% 45%, rgba(7,8,10,0) 0%, rgba(7,8,10,.55) 55%, rgba(7,8,10,.94) 100%);
  }
  #stage{
    position:fixed;inset:0;z-index:2;
    display:flex;align-items:center;justify-content:flex-start;
    padding:6vh 3vw;overflow-y:auto;
  }
  #stage.layout-collapse .panel{
    max-width:min(620px,56vw);
    margin-right:auto;
    transform:none;
    transition:max-width .8s cubic-bezier(.22,.8,.2,1);
  }
  #stage.layout-collapse{
    justify-content:flex-start;
    padding-left:3vw;
    padding-right:3vw;
  }
  @media (max-width:820px){
    #stage{
      justify-content:flex-start;
      padding-left:4vw;
      padding-right:4vw;
    }
    #stage.layout-collapse{
      justify-content:flex-start;
      padding-left:4vw;
      padding-right:4vw;
    }
    #stage.layout-collapse .panel{
      max-width:88vw;
    }
  }
  .panel{
    width:100%;max-width:min(620px,56vw);text-align:left;
    margin-right:auto;
    animation:rise .9s cubic-bezier(.2,.8,.3,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  h1{font-size:clamp(32px,5.6vw,50px);font-weight:400;letter-spacing:.22em;margin-bottom:28px;color:var(--ink);text-shadow:0 0 18px rgba(255,235,198,.22)}
  h2{font-size:clamp(22px,3vw,30px);font-weight:400;letter-spacing:.14em;color:var(--warm-dim);margin-bottom:22px;text-shadow:0 0 14px rgba(255,217,160,.24)}
  p{line-height:2.08;font-size:18px;color:var(--ink-dim);letter-spacing:.05em}
  .quote{font-size:clamp(19px,2.8vw,25px);line-height:2.2;color:var(--ink);letter-spacing:.08em}
  .cite{margin-top:18px;font-size:15px;color:rgba(231,216,188,.82);letter-spacing:.1em}
  .spacer{height:34px}
  .spacer-s{height:20px}

  button{
    font-family:var(--serif);font-size:17px;letter-spacing:.2em;
    color:var(--warm);background:transparent;
    border:1px solid rgba(255,217,160,.28);
    padding:13px 34px;cursor:pointer;
    transition:.35s ease;
    text-shadow:0 0 12px rgba(255,226,173,.28);
  }
  button:hover{background:rgba(255,217,160,.08);border-color:rgba(255,217,160,.6)}
  button:disabled{opacity:.25;cursor:default}
  button.ghost{color:var(--ink-dim);border-color:rgba(208,200,186,.28);font-size:15px;padding:10px 22px;letter-spacing:.12em}
  .btnrow{display:flex;gap:14px;justify-content:flex-start;flex-wrap:wrap;align-items:center}

  textarea{
    width:100%;height:170px;resize:none;
    background:rgba(255,255,255,.025);
    border:1px solid rgba(255,255,255,.09);
    color:var(--ink);font-family:var(--serif);font-size:18px;line-height:2.08;
    padding:20px;outline:none;letter-spacing:.05em;
    text-shadow:0 0 8px rgba(248,237,212,.2);
  }
  textarea:focus{border-color:rgba(255,217,160,.35)}
  textarea::placeholder{color:#4a4740}

  /* ---- 文本坍缩 ---- */
  #text{
    font-size:clamp(20px,2.9vw,27px);line-height:2.46;letter-spacing:.06em;
    text-align:left;min-height:180px;
    padding:26px 24px;
    border-left:1px solid rgba(255,217,160,.16);
    background:linear-gradient(90deg,rgba(255,217,160,.03),transparent 70%);
    text-shadow:0 0 14px rgba(249,238,214,.24);
  }
  #text .c{display:inline-block;transition:none;white-space:pre-wrap}
  .c.flash{animation:flash .55s ease}
  @keyframes flash{0%{color:var(--new);text-shadow:0 0 12px var(--new)}100%{color:var(--ink)}}
  .c.dying{animation:dying .55s ease forwards}
  @keyframes dying{
    0%{color:#ff6b5e;text-shadow:0 0 10px rgba(255,107,94,.7)}
    45%{color:#ff6b5e;transform:translateY(0) rotate(0)}
    100%{color:#ff6b5e;transform:translateY(2px) rotate(-3deg)}
  }
  .c.block{
    color:transparent!important;background:#1e2025;
    box-shadow:inset 0 0 0 1px rgba(255,107,94,.25);
    animation:none!important;transform:none!important;
  }
  .c.collapse{
    transition:max-width .5s cubic-bezier(.6,0,.3,1),opacity .35s ease,transform .5s ease;
    max-width:0;opacity:0;overflow:hidden;transform:scaleX(0);
  }

  /* ---- HUD ---- */
  #hud{
    position:fixed;top:0;left:0;right:0;z-index:3;
    display:flex;justify-content:space-between;align-items:center;
    padding:22px 30px;font-size:13px;letter-spacing:.16em;color:rgba(233,219,194,.72);
    pointer-events:none;
  }
  #hud .n{color:var(--warm-dim);font-size:24px;letter-spacing:.08em;text-shadow:0 0 14px rgba(255,217,160,.28)}
  #hud > div:first-child{min-width:150px}
  #langbtn{
    pointer-events:auto;          /* #hud 整体 none，按钮得自己收回来 */
    min-width:150px;text-align:right;
    font-size:13px;letter-spacing:.18em;padding:6px 0;
    color:rgba(232,217,190,.76);border:none;background:none;
  }
  #langbtn:hover{color:var(--warm);background:none}
  .ticks{display:flex;gap:7px;align-items:center}
  .tick{width:22px;height:1px;background:rgba(255,255,255,.12)}
  .tick.on{background:var(--warm);box-shadow:0 0 8px rgba(255,217,160,.6)}
  .tick.past{background:rgba(255,217,160,.3)}

  .stagename{font-size:15px;letter-spacing:.35em;color:var(--warm-dim);margin-bottom:10px;text-shadow:0 0 12px rgba(255,217,160,.24)}
  .lost{font-size:14px;letter-spacing:.14em;color:#d59486;height:16px;margin-top:16px}

  /* ---- 失语输入 ---- */
  .lockwrap{position:relative;width:100%}
  #lockin{
    width:100%;background:rgba(255,255,255,.025);
    border:1px solid rgba(255,255,255,.09);border-bottom:1px solid rgba(255,217,160,.3);
    color:var(--ink);font-family:var(--serif);font-size:20px;letter-spacing:.1em;
    padding:20px 22px;outline:none;text-align:center;
  }
  #lockin.reject{animation:shake .3s ease;border-color:rgba(255,107,94,.7)}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  .ghostchar{
    position:absolute;font-size:20px;color:#ff6b5e;pointer-events:none;
    animation:fall 1.1s cubic-bezier(.4,0,.9,.6) forwards;
  }
  @keyframes fall{
    0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}
    100%{opacity:0;transform:translateY(70px) rotate(38deg) scale(.55)}
  }
  .allowed{
    font-size:16px;letter-spacing:.55em;color:var(--warm);
    margin:18px 0 6px;text-indent:.55em;
  }

  /* ---- 无名之色 ---- */
  .swatches{display:flex;gap:10px;margin-bottom:26px;justify-content:flex-start}
  .swatch{
    flex:1;height:clamp(110px,18vh,170px);border-radius:2px;
    border:1px solid var(--warm);
    box-shadow:0 0 60px -12px currentColor, 0 0 0 4px rgba(255,217,160,.10);
  }
  .composed{
    font-size:clamp(28px,4.4vw,38px);letter-spacing:.14em;min-height:52px;
    color:var(--warm);display:flex;align-items:center;justify-content:flex-start;
    text-shadow:0 0 16px rgba(255,217,160,.22);
  }
  .composed .ph{font-size:17px;color:rgba(230,217,193,.66);letter-spacing:.2em}
  .tiles{display:flex;gap:8px;justify-content:flex-start;flex-wrap:wrap;margin:12px 0}
  .tile{
    font-family:var(--serif);font-size:18px;letter-spacing:.1em;
    color:var(--ink-dim);background:transparent;
    border:1px solid rgba(255,255,255,.13);padding:9px 15px;cursor:pointer;transition:.25s;
  }
  .tile:hover{color:var(--warm);border-color:rgba(255,217,160,.5)}
  .verdict{
    border-left:1px solid rgba(142,230,255,.3);padding:22px 24px;text-align:left;
    background:linear-gradient(90deg,rgba(142,230,255,.045),transparent 70%);
    font-size:18px;line-height:2.15;letter-spacing:.05em;
    animation:rise .6s cubic-bezier(.2,.8,.3,1) both;
    color:var(--ink);
    text-shadow:0 0 12px rgba(244,235,218,.22);
  }
  .verdict em{font-style:normal;color:var(--new)}
  .cmpwrap{margin-top:20px;border-top:1px solid rgba(255,255,255,.07);padding-top:14px;overflow-x:auto}
  .cmprow{
    display:grid;grid-template-columns:36px 78px 1fr auto;gap:14px;align-items:center;
    padding:8px 0;font-size:16px;letter-spacing:.05em;min-width:340px;
  }
  .cmprow .chip{width:36px;height:20px;border-radius:2px;border:1px solid rgba(255,217,160,.7)}
  .cmprow .zh{color:var(--ink)}
  .cmprow .en{color:#7d9aa4;font-family:Georgia,"Times New Roman",serif;font-style:italic}
  .cmprow .tag{font-size:13px;color:rgba(232,220,199,.66);letter-spacing:.08em;text-align:right;white-space:nowrap}
  .verdict .study{
    display:block;margin-top:16px;padding-top:14px;
    border-top:1px solid rgba(255,255,255,.07);
    font-size:15px;line-height:1.95;color:rgba(228,216,194,.72);letter-spacing:.04em;
  }

  /* ---- 第二幕卡片 ---- */
  .card{
    border:1px solid rgba(142,230,255,.2);
    background:linear-gradient(180deg,rgba(142,230,255,.045),transparent);
    padding:34px 30px;text-align:left;
    animation:rise .7s cubic-bezier(.2,.8,.3,1) both;
  }
  .card .w{font-size:clamp(24px,4vw,34px);color:var(--new);letter-spacing:.06em;margin-bottom:6px;font-weight:400}
  .card .rom{font-size:14px;color:#9dc4ce;letter-spacing:.24em;margin-bottom:20px}
  .card .def{font-size:18px;line-height:2.15;color:var(--ink);letter-spacing:.05em}
  .card .src{margin-top:20px;font-size:14px;color:#9dc4ce;letter-spacing:.16em}

  .stats{display:flex;gap:34px;justify-content:flex-start;flex-wrap:wrap;margin:34px 0}
  .stat .v{font-size:36px;color:var(--warm);letter-spacing:.04em;text-shadow:0 0 14px rgba(255,217,160,.22)}
  .stat .k{font-size:13px;color:rgba(229,216,192,.7);letter-spacing:.16em;margin-top:8px}
  .stat.blue .v{color:var(--new)}

  .hint{font-size:14px;color:rgba(231,218,195,.65);letter-spacing:.14em;margin-top:14px}
  #stage::-webkit-scrollbar{width:0}
</style>
</head>

  <button id="langbtn">中文</button>
</div>
<div id="stage"></div>

const PUNCT = new Set("，。、！？；：…—“”‘’《》（）\n 　".split(""));
const MAXW = 4;                                     // 中文词表里最长的词是 4 字

/* 一个「语言包」= 词频表 + 虚词表 + 分词器 + 降级词典 + 全部文案。
   token 契约：{t 显示文本, w 查表键, p 是否标点/空白, sp 是否纯空白}
   p 的 token 永远不死、也不计入实词数。 */
function mkLang(freqStr, funcStr, extra){
  const RANK = new Map(); freqStr.split(" ").forEach((w,i)=>RANK.set(w,i+1));
  const FUNC = new Set(funcStr.split(" "));
  const DICT = new Set([...RANK.keys(), ...FUNC]);
  /* 虚词排名恒为 0：既不占词表名额，也永远杀不掉。坍缩要拿走的是意义，不是语法——
     「的」「在」「and」「the」留到最后，末层剩下一副完整的句法骨架，里面什么都没有。 */
  const rk = w => FUNC.has(w) ? 0 : (RANK.get(w) || Infinity);
  return Object.assign({RANK, FUNC, DICT, rk}, extra);
}

// 中文：正向最大匹配。词典里的词整块判生死，词典外的串逐字判。
function tokZH(str){
  const a=[...str], out=[]; let i=0;
  while(i<a.length){
    if(PUNCT.has(a[i])){ out.push({t:a[i], p:true, sp:/\s/.test(a[i])}); i++; continue; }
    let hit=null;
    for(let L=Math.min(MAXW,a.length-i); L>=2; L--){
      const c=a.slice(i,i+L).join("");
      if(this.DICT.has(c)){ hit=c; break; }
    }
    if(hit){ out.push({t:hit, w:hit}); i+=[...hit].length; }
    else   { out.push({t:a[i], w:a[i]}); i++; }
  }
  return out;
}

/* 英文：词 / 空白 / 标点各自成 token。
   标点必须独立且不死 —— 把它粘在词后面的话，删掉 "corners," 会连逗号一起带走，
   分句就没了边界，tidy 再也切不出空句子，末尾会堆成一长条噪声。
   空白也必须独立：渲染时它走文本节点，否则整行 inline-block 无处换行。 */
function tokEN(str){
  const re=/([A-Za-z']+)|(\s+)|([^A-Za-z'\s]+)/g, out=[]; let m;
  while((m=re.exec(str))!==null){
    if(m[1]){
      const raw=m[1].toLowerCase().replace(/[^a-z']/g,"");
      out.push({t:m[1], w:this.DICT.has(raw)?raw:raw.split("'")[0]});
    }else{
      out.push({t:m[0], p:true, sp:!!m[2]});
    }
  }
  return out;
}

    if(t.p && /[，。、！？；：,.;:!?]/.test(t.t)) ci++;
  }
  g.markAttr(ts);

  const byClause=new Map();
  for(const t of ts){
    if(!byClause.has(t.ci)) byClause.set(t.ci,[]);
    byClause.get(t.ci).push(t);
  }
  for(const cl of byClause.values()){
    const ws=cl.filter(t=>!t.p);
    if(!ws.length) continue;
    const verbs=ws.filter(t=>t.cls==="V"), last=ws[ws.length-1];
    const hasSubj = ws.some(t=>/[NR]/.test(t.cls));
    // 「暮色很暖」没有动词，形容词就是谓语——不认这条会把整句当残句删掉
    const hasPred = verbs.length>0 || last.cls==="A";
    const simile  = g.simile.has(ws[0].w);
    const timeAdv = g.timeTail.has(last.w);
    // 认知动词收在句尾 → 它后面跟的是宾语从句，这一句只是外壳（「我忽然觉得，」）
    const shell   = verbs.length>0 && g.cog.has(verbs[verbs.length-1].w) && last===verbs[verbs.length-1];
    const dead = !hasSubj || !hasPred || simile || timeAdv || shell;
    for(const t of cl) t.dropClause = dead;

    /* 时间状语从句里的主语其实是后一句的主语（「她笑起来的时候，眼角有…」），
       整句删掉会把「她」一起带走。留下开头的代词，并吃掉本句的句读，让它并进下一句。 */
    if(dead && timeAdv){
      let saved=false;
      for(const t of cl){
        if(t.p) continue;
        if(t.cls==="R"){ t.dropClause=false; saved=true; } else break;
      }
      const tail=cl[cl.length-1];
      if(saved && tail.p && !tail.sp) tail.dropClause=true;
    }
    verbs.slice(1).forEach(v=>v.extraVerb=true);   // 电报式：一句只留一个谓语
  }
  return ts;
}

/* 整句被删时它的句读跟着走，剩下的碎片会被逗号连成一条流水句。
   两个幸存分句之间只要整没了一句，它们在句法上就断了关系——那道缝该是句号。 */
function promotePunct(ts, kill){
  let alive=-1;
  for(let i=0;i<ts.length;i++){
    const t=ts[i];
    if(!t.p || t.sp) continue;
    if(kill.has(i)){
      if(alive>=0) ts[alive].t = L==="zh" ? "。" : ".";
    }else alive=i;
  }
}

// 每层只管自己那条规则，前面几层删掉的 token 已经不在了
function doomed(t, st){
  // 整句被删时它的句读也要跟着删，否则会留下一串空标点
  if(t.p) return st.key==="claus" && !t.sp && !!t.dropClause;
  switch(st.key){
    case "func":  return t.cls==="F";
    case "mod":   return t.cls==="D" || t.cls==="M" || !!t.attr;
    case "claus": return !!t.dropClause || !!t.extraVerb;
    default:      return G().rk(t.w) > st.lim;
  }
}

const killIdx = (ts,st) => {
  const k=new Set();
  ts.forEach((t,i)=>{ if(doomed(t,st)) k.add(i); });
  return k;
};

// 顺着链条找第一个在本层还活着的替代词；找不到就返回 null（那就只能死）
function downTarget(w, lim){
  const D=G().down; let cur=w;
  for(let hop=0; hop<5; hop++){
    const nx=D.get(cur); if(!nx) return null;
    if(G().rk(nx)<=lim) return nx;
    cur=nx;
  }
  return null;
}

/* 本层要压扁哪些词。
   剥从句那层顺手做生僻词降级（褶皱→皱纹）；词频层则是「本来要死、但有活着的上位词」。 */
function flatten(t, st){
  if(t.p) return null;
  if(st.key==="claus") return G().fam.get(t.w) || null;   // 书面语 → 日常说法，不看词频
  if(st.lim === undefined) return null;
  return G().rk(t.w) > st.lim ? downTarget(t.w, st.lim) : null;
}

const X = () => TXT[L];

/* ---------- 星野画布 ---------- */
const cv = document.getElementById("field"), cx = cv.getContext("2d");
let W=0,H=0,CXp=0,CYp=0,BASE=0;
const nodes=[], outer=[];
let curR=1.0, tgtR=1.0, t=0;
let clusterShift=0, clusterShiftTgt=0;
let spinY=0, spinX=0;
let rafId=0;
let live=true;

function seed(){
  nodes.length=0;
  for(let i=0;i<1100;i++){
    const rr=Math.pow(Math.random(), 1/3);
    const theta=Math.random()*Math.PI*2;
    const z=(Math.random()*2-1);
    const xy=Math.sqrt(Math.max(0, 1-z*z));
    nodes.push({
      r:rr,
      x:rr*xy*Math.cos(theta),
      y:rr*xy*Math.sin(theta),
      z:rr*z,
      s:1.05+Math.random()*2.35,
      p:Math.random()*Math.PI*2,
      w:.4+Math.random()*1.4,
    });
  }
  outer.length=0;
  const N=X().words.length+2;                      // +2 给无名之色的 голубой 和 青
  for(let i=0;i<N;i++){
    const theta=(i/N)*Math.PI*2+Math.random()*.24;
    const z=(Math.random()*2-1)*0.78;
    const xy=Math.sqrt(Math.max(0, 1-z*z));
    const rr=1.12+Math.random()*.22;
    outer.push({
      r:rr,
      x:rr*xy*Math.cos(theta),
      y:rr*xy*Math.sin(theta),
      z:rr*z,
      lit:0,
      p:Math.random()*Math.PI*2,
    });
  }
}
function resize(){
  const d=window.devicePixelRatio||1;
  const rect=cv.getBoundingClientRect();
  W=Math.max(1, Math.round(rect.width || innerWidth));
  H=Math.max(1, Math.round(rect.height || innerHeight));
  cv.width=Math.max(1, Math.round(W*d));
  cv.height=Math.max(1, Math.round(H*d));
  cx.setTransform(d,0,0,d,0,0);
  CXp=W*0.5; CYp=H*0.43; BASE=Math.min(W,H)*0.28;
}
addEventListener("resize",resize);

function draw(){
  if(!live) return;
  t+=0.016;
  curR += (tgtR-curR)*0.045;
  clusterShift += (clusterShiftTgt-clusterShift)*0.06;

  spinY += 0.0105;
  spinX += 0.0042;

  const fitLimit = Math.max(56, Math.min(W, H) * 0.5 - 42);
  const maxBaseByViewport = Math.max(42, (fitLimit - 44) / 1.34);
  const sphereBase = Math.min(BASE, maxBaseByViewport);

  const targetCXR = CXp + clusterShift * W;
  const visibleRadius = sphereBase * 1.34 + 44;
  const minX = visibleRadius;
  const maxX = W - visibleRadius;
  const minY = visibleRadius;
  const maxY = H - visibleRadius;
  const CXR = minX < maxX ? Math.max(minX, Math.min(maxX, targetCXR)) : W * 0.5;
  const CYR = minY < maxY ? Math.max(minY, Math.min(maxY, CYp)) : H * 0.5;

  const project = (x,y,z)=>{
    const ay = spinY + Math.sin(t*0.21)*0.1;
    const ax = 0.36 + Math.sin(t*0.17)*0.11 + spinX*0.11;
    const cy=Math.cos(ay), sy=Math.sin(ay), cxr=Math.cos(ax), sxr=Math.sin(ax);

    const x1 = x*cy + z*sy;
    const z1 = -x*sy + z*cy;
    const y2 = y*cxr - z1*sxr;
    const z2 = y*sxr + z1*cxr;
    const perspective = sphereBase*1.18;
    const depth = perspective / Math.max(sphereBase*0.2, perspective + z2*0.95);
    return {x:x1,y:y2,z:z2,depth};
  };

  cx.clearRect(0,0,W,H);

  // 内部辉光
  const R=sphereBase*curR;
  const g=cx.createRadialGradient(CXR,CYR,0,CXR,CYR,R*1.25);
  g.addColorStop(0,"rgba(255,222,170,.12)");
  g.addColorStop(.6,"rgba(255,206,132,.058)");
  g.addColorStop(1,"rgba(255,196,120,0)");
  cx.fillStyle=g; cx.beginPath(); cx.arc(CXR,CYR,R*1.25,0,7); cx.fill();

  // 节点
  for(const n of nodes){
    const x0=n.x*sphereBase;
    const y0=n.y*sphereBase;
    const z0=(n.z*sphereBase*0.96)+Math.sin(t*n.w+n.p)*sphereBase*0.018;
    const p=project(x0,y0,z0);
    const x=CXR+p.x;
    const y=CYR+p.y;
    const alive=n.r<curR;
    const tw=0.55+0.45*Math.sin(t*n.w+n.p);
    const dep=Math.max(0.45,Math.min(1.35,p.depth||1));
    if(alive){
      const edge=1-Math.min(1,Math.max(0,(curR-n.r)/0.14));  // 边界处更亮
      cx.fillStyle=`rgba(255,${220+Math.round(36*tw)},${170+Math.round(56*tw)},${((.52+.68*tw)*(.62+.55*edge))*Math.min(1.25,dep)})`;
      cx.beginPath(); cx.arc(x,y,(n.s*(1.25+.65*edge)*dep)+0.25,0,7); cx.fill();
    }else{
      cx.fillStyle=`rgba(148,160,178,${(.11+.07*tw)*Math.max(.5,dep*.78)})`;      // 熄灭但仍在：你够不到的东西
      cx.beginPath(); cx.arc(x,y,n.s*.82*Math.max(.75,dep),0,7); cx.fill();
    }
  }

  // 第二幕：黑暗里新亮起的节点
  for(const o of outer){
    if(o.lit<=0) continue;
    o.lit=Math.min(1,o.lit+0.028);
    const x0=o.x*sphereBase;
    const y0=o.y*sphereBase;
    const z0=(o.z*sphereBase*0.9)+Math.sin(t*0.9+o.p)*sphereBase*0.03;
    const p=project(x0,y0,z0);
    const x=CXR+p.x, y=CYR+p.y;
    const pu=.6+.4*Math.sin(t*1.6+o.p*1.9);
    const dep=Math.max(0.45,Math.min(1.35,p.depth||1));
    cx.fillStyle=`rgba(156,238,255,${1.05*o.lit*pu*Math.min(1.28,dep)})`;
    cx.beginPath(); cx.arc(x,y,4.2*dep,0,7); cx.fill();
    const gg=cx.createRadialGradient(x,y,0,x,y,42);
    gg.addColorStop(0,`rgba(142,230,255,${.34*o.lit})`); gg.addColorStop(1,"rgba(142,230,255,0)");
    cx.fillStyle=gg; cx.beginPath(); cx.arc(x,y,42,0,7); cx.fill();
    cx.strokeStyle=`rgba(142,230,255,${.2*o.lit})`; cx.lineWidth=1.2;
    cx.beginPath(); cx.moveTo(CXR,CYR); cx.lineTo(x,y); cx.stroke();
  }
  rafId=requestAnimationFrame(draw);
}

/* 一个 token 一个 span —— 纯空白必须走文本节点，
   否则一整行都是 inline-block，浏览器找不到换行点，英文会横着溢出。 */
let SP=[];
function render(ts, flash){
  const box=$("text"); box.innerHTML=""; SP=[];
  ts.forEach((tk,i)=>{
    if(tk.sp){ box.appendChild(document.createTextNode(tk.t)); SP[i]=null; return; }
    const s=document.createElement("span");
    s.className="c"+(flash&&flash.has(i)?" flash":"");
    s.textContent=tk.t; box.appendChild(s); SP[i]=s;
  });
}

// 降级时保住原词的大小写和尾随标点："laughs," + good → "Good," 而不是 "good"
function swapWord(tk, alt){
  const m = tk.t.match(/^([A-Za-z'一-龥]+)([\s\S]*)$/);
  const head = m ? m[1] : tk.t, tail = m ? m[2] : "";
  const cased = /^[A-Z]/.test(head) ? alt.charAt(0).toUpperCase()+alt.slice(1) : alt;
  return {t: cased+tail, w: alt};
}

/* 丢掉一个实词都不剩的分句；不去动虚词本身——
   它们留在原地正是重点：句法还在，世界没了。 */
function tidy(ts, stage){
  const isBreak = t => t.p && /[，。、！？；：,.;:!?]/.test(t.t);
  const out=[]; let buf=[], has=false;
  const flush=()=>{ if(buf.length && (has || stage<2)) out.push(...buf); buf=[]; has=false; };
  for(const t of ts){
    buf.push(t);
    if(!t.p && !G().FUNC.has(t.w)) has=true;
    if(isBreak(t)) flush();
  }
  flush();
  const res=[];
  for(const t of out){
    if(t.sp && res.length && res[res.length-1].sp) continue;   // 并掉连续空白
    if(!res.length && t.p) continue;                            // 去掉开头的标点/空格
    // 词被删掉后会留下 "she , me" 里那个多余的空格，收掉
    if(t.p && !t.sp && res.length && res[res.length-1].sp) res.pop();
    res.push(t);
  }
  return res;
}

let busy=false;
function stepDown(){
  if(busy) return;
  if(S.stage>=STAGES.length-1){ scrLock(); return; }
  busy=true; $("step").disabled=true;
  S.stage++; const st=STAGES[S.stage];
  $("sname").textContent=X().stages[S.stage];
  tgtR=st.r; hud();

  // 1) 降级：不是删掉，是压扁
  const flash=new Set();
  const cur=S.toks.map((t,i)=>{
    const alt=flatten(t, st);
    if(alt===null) return t;
    flash.add(i); return Object.assign(swapWord(t, alt), {
      ci:t.ci, cls:t.cls, attr:t.attr, dropClause:t.dropClause, extraVerb:t.extraVerb
    });
  });
  render(cur, flash);

  // 2) 处决
  setTimeout(()=>{
    const kill=killIdx(cur, st);
    promotePunct(cur, kill);
    kill.forEach(i=>SP[i]&&SP[i].classList.add("dying"));
    setTimeout(()=>kill.forEach(i=>SP[i]&&SP[i].classList.add("block")),560);
    setTimeout(()=>kill.forEach(i=>SP[i]&&SP[i].classList.add("collapse")),1180);
    setTimeout(()=>{
      S.toks=tidy(cur.filter((t,i)=>!kill.has(i)), S.stage);
      render(S.toks);
      const left=contentLen(S.toks);
      $("lost").innerHTML = kill.size ? X().colLost(kill.size,left,S.startLen) : "";
      hud();                                  // 数字要等处决完再更新
      busy=false; $("step").disabled=false;
      if(S.stage>=STAGES.length-1){
        $("step").textContent=X().colAgain;
        $("lost").innerHTML += X().colFloor;
      }
    },1720);
  }, flash.size?620:60);
}

/* 只放行十个实词，虚词一个都不给——语法在第一层就掉光了。
   于是你能叫出名字，却拼不出任何关系。 */
function lockAllow(){
  const t10=[...G().RANK.keys()].slice(0,10);
  return L==="zh" ? {t10, set:new Set(t10.join(""))} : {t10, set:new Set(t10)};
}

function scrLock(){
  tgtR=STAGES[5].r; hud();
  const A=lockAllow();
  show(`
    <div class="stagename">${X().lkName}</div>
    <p>${X().lkBody}</p>
    <div class="allowed">${A.t10.join(L==="zh"?" ":" · ")}</div>
    <div class="spacer-s"></div>
    <div class="lockwrap"><input id="lockin" autocomplete="off" placeholder="${X().lkPh}"></div>
    <div class="lost" id="blocked"></div>
    <div class="spacer"></div>
    <button id="on" class="ghost" disabled>${X().lkBtn}</button>
    <div class="hint">${X().lkHint}</div>
  `);
  const inp=$("lockin"); let composing=false;
  inp.focus();

  const reject=(drop)=>{
    inp.classList.remove("reject"); void inp.offsetWidth; inp.classList.add("reject");
    const box=inp.parentElement, w=box.clientWidth;
    drop.forEach((c,i)=>{
      const g=document.createElement("span");
      g.className="ghostchar"; g.textContent=c;
      g.style.left=(w/2 - drop.length*26/2 + i*52)+"px"; g.style.top="24px";
      box.appendChild(g); setTimeout(()=>g.remove(),1150);
    });
    S.blocked+=drop.length;
    $("blocked").textContent=X().lkBlocked(S.blocked);
    $("on").disabled=false;
  };

  const filter=()=>{
    const v=inp.value;
    if(L==="zh"){
      const keep=[], drop=[];
      [...v].forEach(c=>{ (A.set.has(c)||PUNCT.has(c)) ? keep.push(c) : drop.push(c); });
      if(drop.length){ inp.value=keep.join(""); reject(drop); }
    }else{
      // 英文按词判：只有在词打完（后面跟了空格或标点）时才检查，否则每敲一个字母都会被毙
      const m=v.match(/([A-Za-z']+)([^A-Za-z']+)$/);
      if(!m) return;
      const w=m[1].toLowerCase();
      if(A.set.has(w)) return;
      inp.value = v.slice(0, v.length-m[0].length) + m[2];
      reject([m[1]]);
    }
  };
  inp.addEventListener("compositionstart",()=>composing=true);
  inp.addEventListener("compositionend",()=>{composing=false; filter();});
  inp.addEventListener("input",()=>{ if(!composing) filter(); });
  $("on").onclick=()=>scrColor(0);
  setTimeout(()=>$("on").disabled=false, 12000);   // 兜底：没人挣扎也能走
}

// 揭示区：正文 + 可选的跨语言对照表 + 可选的追加段 + 可选的出处
const vHTML = c => c.v
  + (c.table ? `<div class="cmpwrap">${c.table.map(([h,zh,en,tag])=>
      `<div class="cmprow"><div class="chip" style="background:${h}"></div>`+
      `<div class="zh">${zh}</div><div class="en">${en}</div><div class="tag">${tag}</div></div>`
    ).join("")}</div>` : "")
  + (c.after ? `<div style="margin-top:18px">${c.after}</div>` : "")
  + (c.study ? `<span class="study">${c.study}</span>` : "");

function scrColor(i){
  if(i===0) setLayoutMode("center");
  const CS=X().colors;
  if(i>=CS.length) return scrTurn();
  const c=CS[i];
  $("hudN").textContent=i+1;
  $("hudLabel").textContent=(L==="zh"?"/ "+CS.length+" ":"")+X().clHud;
  if(i===2) outer[X().words.length].lit=0.01;      // голубой：黑暗里第一次亮起
  if(i===3) outer[X().words.length+1].lit=0.01;    // 青
  tgtR=0.14+0.02*i;

  const sw=c.hex.map(h=>`<div class="swatch" style="background:${h};color:${h}"></div>`).join("");
  if(c.reveal){
    show(`<div class="stagename">${X().clName}</div>
      <div class="swatches">${sw}</div>
      <div class="verdict">${vHTML(c)}</div>
      <div class="spacer"></div>
      <button id="nx">${i===CS.length-1?X().clLast:X().clNext}</button>`);
    $("nx").onclick=()=>scrColor(i+1);
    return;
  }

  show(`<div class="stagename">${X().clName}</div>
    <div class="swatches">${sw}</div>
    <p>${c.ask}${X().clAskTail}</p>
    <div class="composed" id="cmp"><span class="ph">${X().clPh}</span></div>
    <div class="tiles">${G().mod.map(w=>`<button class="tile" data-w="${w}">${w}</button>`).join("")}</div>
    <div class="tiles">${G().hue.map(w=>`<button class="tile" data-w="${w}">${w}</button>`).join("")}</div>
    <div class="spacer-s"></div>
    <div class="btnrow">
      <button id="ok" disabled>${X().clOk}</button>
      <button class="ghost" id="clr">${X().clClr}</button>
    </div>`);

  let built=[];
  const word=()=>built.join(L==="zh"?"":" ");
  const paint=()=>{
    $("cmp").innerHTML = built.length ? word() : `<span class="ph">${X().clPh}</span>`;
    $("ok").disabled = !built.length;
  };
  el.querySelectorAll(".tile").forEach(b=>{
    b.onclick=()=>{ if(built.length<G().maxTile){ built.push(b.dataset.w); paint(); } };
  });
  $("clr").onclick=()=>{ built=[]; paint(); };
  $("ok").onclick=()=>{
    show(`<div class="stagename">${X().clName}</div>
      <div class="swatches">${sw}</div>
      <p style="letter-spacing:.14em">${X().clMade}<span style="color:var(--warm);font-size:20px">${word()}</span></p>
      <div class="spacer-s"></div>
      <div class="verdict">${vHTML(c)}</div>
      <div class="spacer"></div>
      <button id="nx">${X().clNext}</button>`);
    $("nx").onclick=()=>scrColor(i+1);
  };
}

function scrTurn(){
  show(`
    <h2>${X().tnH}</h2>
    <p class="quote">${X().tnQuote}</p>
    <div class="spacer"></div>
    <p>${X().tnBody}</p>
    <div class="spacer"></div>
    <button id="go">${X().tnBtn}</button>
  `);
  $("go").onclick=()=>scrWord(0);
}

function scrWord(i){
  const WS=X().words;
  if(i>=WS.length) return scrEnd();
  const w=WS[i];
  outer[i].lit=0.01; S.learned++;
  tgtR=Math.min(1.35, STAGES[5].r + 0.055*(i+1) + 0.10);
  $("hudN").textContent="+"+S.learned;
  $("hudLabel").textContent=X().wdHud;
  show(`
    <div class="card">
      <div class="w">${w.w}</div>
      <div class="rom">${w.rom}</div>
      <div class="def">${w.def}</div>
      <div class="src">${w.src}　·　${X().wdNone}</div>
    </div>
    <div class="spacer"></div>
    <div class="btnrow">
      <button id="nx">${i===WS.length-1?X().wdBack:X().wdNext}</button>
      <span style="font-size:12px;color:#4a4740;letter-spacing:.14em">${i+1} / ${WS.length}</span>
    </div>
  `);
  $("nx").onclick=()=>scrWord(i+1);
}

function scrEnd(){
  const left=contentLen(S.toks);
  tgtR=1.45;
  show(`
    <div class="stats">
      <div class="stat"><div class="v">${S.startLen}</div><div class="k">${X().edWrote}</div></div>
      <div class="stat"><div class="v">${left}</div><div class="k">${X().edLeft}</div></div>
      <div class="stat"><div class="v">${S.blocked}</div><div class="k">${X().edBlocked}</div></div>
      <div class="stat blue"><div class="v">+${S.learned}</div><div class="k">${X().edGained}</div></div>
    </div>
    <div id="text" style="border-left-color:rgba(142,230,255,.2);background:linear-gradient(90deg,rgba(142,230,255,.03),transparent 70%)">${text(S.toks)||"……"}</div>
    <div class="hint" style="text-align:left;padding-left:24px">${X().edCaption}</div>
    <div class="spacer"></div>
    <p class="quote">${X().edQuote}</p>
    <div class="cite">${X().edCite}</div>
    <div class="spacer"></div>
    <p>${X().edBody}</p>
    <div class="spacer"></div>
    <button id="continue" class="ghost">${X().edAgain}</button>
  `);
  $("continue").onclick=()=>transitionToChapterIII();
}

function transitionToChapterIII(){
  const root = cv.closest(".ubl-experience") || document.body;
  if(root.classList.contains("ubl-exit")) return;
  root.classList.add("ubl-exit");

  const to = "/chapter-iii?transition=blur";
  setTimeout(()=>{
    if(typeof window.__UBL_NAVIGATE === "function"){
      window.__UBL_NAVIGATE(to);
      return;
    }
    window.location.assign(to);
  }, 900);
}

/* ---------- 启动 ---------- */
resize(); seed(); draw();
document.documentElement.lang = L === "zh" ? "zh-CN" : "en";
$("langbtn").onclick = ()=>setLang(L==="zh"?"en":"zh");
scrPrologue();
const onKeyDown = e=>{
  if(e.key==="Enter"&&!e.shiftKey){
    const b=el.querySelector("button:not(:disabled)");
    if(b && document.activeElement.tagName!=="TEXTAREA") b.click();
  }
};
document.addEventListener("keydown",onKeyDown);

window.__UBL_API = {
  setLang(next){
    if(next!=="zh" && next!=="en") return;
    if(next===L) return;
    setLang(next);
  },
  destroy(){
    live=false;
    if(rafId) cancelAnimationFrame(rafId);
    removeEventListener("resize",resize);
    document.removeEventListener("keydown",onKeyDown);
  }
};
</script>
</body>
</html>
