<title>语言功能脑连接图谱</title>
<style>

      --ink:#e7ecf4; --muted:#939dac; --line:#242e3d; --line-strong:#33405360;

  }
  :root[data-theme="light"]{ --bg:#f5f7fa; --panel:#ffffff; --panel-2:#fafbfc;
    --ink:#1a2230; --muted:#69727f; --line:#e4e8ee; --line-strong:#cfd6df; --accent:#4f7fe0; --node:#8a93a3;}
  :root[data-theme="dark"]{ --bg:#0e1219; --panel:#151b25; --panel-2:#111722;
    --ink:#e7ecf4; --muted:#939dac; --line:#242e3d; --line-strong:#33405360; --accent:#6d97ee; --node:#5c6675;}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);

    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}

  .title h1{margin:0;font-size:17px;font-weight:650;letter-spacing:-.01em}

  .spacer{flex:1 1 auto}

    padding:5px 11px 5px 9px;border:1px solid var(--line-strong);border-radius:999px;
    background:var(--panel-2);font-size:12.5px;font-weight:550;color:var(--ink);
    transition:opacity .15s,border-color .15s;}
  .chip .dot{width:9px;height:9px;border-radius:50%;background:var(--c)}

  .chip:focus-visible,.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .btn{cursor:pointer;border:1px solid var(--line-strong);background:var(--panel-2);color:var(--ink);
    font:inherit;font-size:12.5px;font-weight:550;padding:6px 12px;border-radius:8px;}
  .btn:hover{border-color:var(--accent)}
  main{flex:1 1 auto;display:flex;min-height:0}
  .canvas-wrap{position:relative;flex:1 1 auto;min-width:0}
  svg{width:100%;height:100%;display:block;touch-action:none}
  .edge{fill:none;stroke-width:1.7;opacity:.7;transition:opacity .15s,stroke-width .15s}
  .edge.dim{opacity:.05}
  .edge.hot{opacity:1;stroke-width:3.2}
  .node .shp{stroke:var(--panel);stroke-width:2;cursor:grab;fill:var(--node)}
  .node.dragging .shp{cursor:grabbing}
  .node text{font-size:10.5px;font-weight:600;fill:var(--ink);pointer-events:none;paint-order:stroke;
    stroke:var(--panel);stroke-width:3px;stroke-linejoin:round}
  .node.dim{opacity:.12}
  .node.sel .shp{stroke:var(--accent);stroke-width:3.5}

    overflow-y:auto;padding:20px;}
  @media (max-width:840px){main{flex-direction:column}
    aside{width:auto;flex:0 0 auto;max-height:46%;border-left:none;border-top:1px solid var(--line)}}
  .panel-empty{color:var(--muted);font-size:13px;margin-top:40px;text-align:center}

  .region-sub{color:var(--muted);font-size:12.5px;margin:3px 0 14px}

  .kv span{background:var(--panel-2);border:1px solid var(--line);padding:3px 8px;border-radius:6px}
  .grp-h{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
    font-weight:650;margin:18px 0 8px}
  .edge-card{border:1px solid var(--line);border-left:3px solid var(--c,var(--line));
    border-radius:9px;padding:10px 12px;margin-bottom:9px;background:var(--panel-2)}
  .edge-card .flow{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .edge-card .arr{color:var(--muted)}
  .rel{font-size:11px;color:var(--muted)}
  .badge{display:inline-block;font-size:10.5px;font-weight:650;padding:2px 7px;border-radius:5px;color:#fff;background:var(--c,var(--muted))}
  .meta{margin-top:6px;font-size:11.5px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .dir{font-weight:650;padding:1px 6px;border-radius:5px;border:1px solid currentColor}
  .dir.up{color:#c2472f} .dir.down{color:#2f7dc2}
  :root[data-theme="dark"] .dir.up{color:#f0836b} :root[data-theme="dark"] .dir.down{color:#77b0ef}
  .quote{margin:7px 0 0;font-size:12px;color:var(--muted);font-style:italic;
    border-left:2px solid var(--line-strong);padding-left:9px;line-height:1.45}
  a.pmid{color:var(--accent);text-decoration:none} a.pmid:hover{text-decoration:underline}
  footer{padding:9px 22px;border-top:1px solid var(--line);background:var(--panel);font-size:11.5px;
    color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;align-items:center}
  .lg{display:inline-flex;align-items:center;gap:5px}
  .lg .ln{width:18px;height:0;border-top:2.4px solid var(--muted)} .lg .ln.dash{border-top-style:dashed}
  .lg .sh{width:11px;height:11px;background:var(--muted)} .lg .sh.dia{transform:rotate(45deg);width:9px;height:9px}
  .tip{position:fixed;pointer-events:none;z-index:20;background:var(--ink);color:var(--bg);padding:7px 10px;
    border-radius:7px;font-size:11.5px;max-width:280px;box-shadow:var(--shadow);opacity:0;transition:opacity .12s;line-height:1.4}

</style>

const nodeById={};

const ZOOM_MIN=1,ZOOM_MAX=6;

function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function applyViewBox(){svg.setAttribute("viewBox",`${viewX} ${viewY} ${viewW} ${viewH}`);}

function setZoomAtClient(nextZoom,clientX,clientY){
  const nz=clamp(nextZoom,ZOOM_MIN,ZOOM_MAX);
  if(Math.abs(nz-zoom)<1e-4)return;

  const r=svg.getBoundingClientRect();
  const px=clamp((clientX-r.left)/Math.max(r.width,1),0,1);
  const py=clamp((clientY-r.top)/Math.max(r.height,1),0,1);
  const worldX=viewX+px*viewW;
  const worldY=viewY+py*viewH;

  const nextViewW=W/nz;
  const nextViewH=H/nz;
  const maxX=Math.max(0,W-nextViewW);
  const maxY=Math.max(0,H-nextViewH);

  viewX=clamp(worldX-px*nextViewW,0,maxX);
  viewY=clamp(worldY-py*nextViewH,0,maxY);
  viewW=nextViewW;
  viewH=nextViewH;
  zoom=nz;
  applyViewBox();
}

function resetZoom(){
  zoom=1;
  viewX=0;
  viewY=0;
  viewW=W;
  viewH=H;
  applyViewBox();
}

function resetPanel(){document.getElementById("aside").innerHTML=defaultPanelHtml;}
const defs=document.createElementNS(SVGNS,"defs");

svg.appendChild(defs);

svg.appendChild(gEdges);svg.appendChild(gNodes);

const edgeEls=links.map(l=>{const p=document.createElementNS(SVGNS,"path");
  p.setAttribute("class","edge");p.setAttribute("stroke",ecol(l.evidence_type));
  if(l.directed)p.setAttribute("marker-end","url(#arw-"+l.evidence_type+")");

  p.addEventListener("mouseleave",hideTip);gEdges.appendChild(p);return p;});
N.forEach(n=>{const g=document.createElementNS(SVGNS,"g");g.setAttribute("class","node");
  const r=n.radius;let shp;
  if(n.type==="region"){shp=document.createElementNS(SVGNS,"circle");shp.setAttribute("r",r);}
  else{shp=document.createElementNS(SVGNS,"rect");const s=r*1.7;shp.setAttribute("x",-s/2);
    shp.setAttribute("y",-s/2);shp.setAttribute("width",s);shp.setAttribute("height",s);
    shp.setAttribute("transform","rotate(45)");shp.setAttribute("rx",1.5);}
  shp.setAttribute("class","shp");

    t.setAttribute("dy",-(r+4));t.textContent=n.label;g.appendChild(t);n._label=t;}   // 叶子节点不常显标签，悬停再显
  else{n._label=null;}

  g.addEventListener("mouseenter",e=>showNodeTip(e,n));g.addEventListener("mousemove",moveTip);
  g.addEventListener("mouseleave",hideTip);

function simulate(iter){for(let k=0;k<iter;k++){
  for(let i=0;i<N.length;i++){const a=N[i];
    for(let j=i+1;j<N.length;j++){const b=N[j];
      let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+.01,d=Math.sqrt(d2),ux=dx/d,uy=dy/d;
      const rep=5600/d2;a.vx+=ux*rep;a.vy+=uy*rep;b.vx-=ux*rep;b.vy-=uy*rep;
      const minD=(a.radius+b.radius)*1.58;
      if(d<minD){const push=(minD-d)*.22;a.vx+=ux*push;a.vy+=uy*push;b.vx-=ux*push;b.vy-=uy*push;}
    }
    a.vx+=(W/2-a.x)*.0018;a.vy+=(H/2-a.y)*.0018;
  }
  for(const l of links){let dx=l.t.x-l.s.x,dy=l.t.y-l.s.y,d=Math.sqrt(dx*dx+dy*dy)+.01;
    const f=(d-122)*.016;l.s.vx+=dx/d*f;l.s.vy+=dy/d*f;l.t.vx-=dx/d*f;l.t.vy-=dy/d*f;}
  for(const a of N){if(a.fx!=null){a.x=a.fx;a.y=a.fy;a.vx=a.vy=0;continue;}
    a.x+=a.vx*.5;a.y+=a.vy*.5;a.vx*=.84;a.vy*=.84;}}}   // 不硬夹边界，交给 fitView 缩放到视口

function fitView(padT,padX,padB){
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const n of N){x0=Math.min(x0,n.x);x1=Math.max(x1,n.x);y0=Math.min(y0,n.y);y1=Math.max(y1,n.y);}
  const gw=Math.max(x1-x0,1),gh=Math.max(y1-y0,1);
  const s=Math.min((W-2*padX)/gw,(H-padT-padB)/gh);
  const ox=(W-gw*s)/2-x0*s, oy=padT-y0*s;
  for(const n of N){n.x=n.x*s+ox;n.y=n.y*s+oy;}
}

function render(){
  links.forEach((l,i)=>{const on=active.has(l.evidence_type),rel=selected&&(l.s===selected||l.t===selected);
    const e=edgeEls[i];e.style.display=on?"":"none";
    e.setAttribute("class","edge"+(!on?"":selected?(rel?" hot":" dim"):""));
    const sx=l.s.x,sy=l.s.y,tx=l.t.x,ty=l.t.y,mx=(sx+tx)/2,my=(sy+ty)/2,dx=tx-sx,dy=ty-sy,nl=Math.hypot(dx,dy)||1;
    const cx=mx-dy/nl*16,cy=my+dx/nl*16;e.setAttribute("d",`M${sx} ${sy} Q${cx} ${cy} ${tx} ${ty}`);});
  N.forEach(n=>{const vis=links.some(l=>(l.s===n||l.t===n)&&active.has(l.evidence_type));
    const nearSelected=selected&&links.some(l=>active.has(l.evidence_type)&&((l.s===selected&&l.t===n)||(l.t===selected&&l.s===n)));
    n._g.style.display=vis?"":"none";let cls="node";
    if(selected){if(n===selected)cls+=" sel";
      else if(!nearSelected)cls+=" dim";}
    if(n._label){const showLabel=!!selected?(n===selected||nearSelected):(zoom>=1.35||n.deg>=4);n._label.style.display=showLabel?"":"none";}
    n._g.setAttribute("class",cls);n._g.setAttribute("transform",`translate(${n.x} ${n.y})`);});
}

let drag=null;
let pan=null;
let suppressBlankClick=false;
function startDrag(e,n,g){e.stopPropagation();drag={n,g};g.classList.add("dragging");
  n.fx=n.x;n.fy=n.y;g.setPointerCapture(e.pointerId);}
svg.addEventListener("pointerdown",e=>{if(e.target!==svg)return;pan={sx:e.clientX,sy:e.clientY,baseX:viewX,baseY:viewY,moved:false};suppressBlankClick=false;svg.setPointerCapture(e.pointerId);});
svg.addEventListener("pointermove",e=>{
  if(drag){const pt=toSvg(e.clientX,e.clientY);drag.n.x=drag.n.fx=pt.x;drag.n.y=drag.n.fy=pt.y;render();return;}
  if(!pan)return;
  const r=svg.getBoundingClientRect();
  const dx=((e.clientX-pan.sx)/Math.max(r.width,1))*viewW;
  const dy=((e.clientY-pan.sy)/Math.max(r.height,1))*viewH;
  const maxX=Math.max(0,W-viewW),maxY=Math.max(0,H-viewH);
  viewX=clamp(pan.baseX-dx,0,maxX);viewY=clamp(pan.baseY-dy,0,maxY);
  if(Math.abs(e.clientX-pan.sx)>2||Math.abs(e.clientY-pan.sy)>2)pan.moved=true;
  suppressBlankClick=pan.moved;applyViewBox();
});
svg.addEventListener("pointerup",()=>{
  if(drag){drag.g.classList.remove("dragging");drag.n.fx=drag.n.fy=null;drag=null;}
  if(pan){suppressBlankClick=pan.moved;pan=null;}
});   // 释放即停留，不再重排，保持已适配好的布局
svg.addEventListener("pointercancel",()=>{if(pan)pan=null;});
svg.addEventListener("wheel",e=>{e.preventDefault();const k=e.deltaY>0?1/1.12:1.12;setZoomAtClient(zoom*k,e.clientX,e.clientY);},{passive:false});
svg.addEventListener("dblclick",()=>resetZoom());

function toSvg(cx,cy){const r=svg.getBoundingClientRect();return{x:viewX+(cx-r.left)/r.width*viewW,y:viewY+(cy-r.top)/r.height*viewH};}

    ${inc.length?`<div class="grp-h">输入连接 · INCOMING</div>${inc.map(l=>card(l,true)).join("")}`:""}

  b.setAttribute("aria-pressed","true");b.style.setProperty("--c",ecol(t));
  b.innerHTML=`<span class="dot"></span>${elab(t)} <span style="color:var(--muted)">${cnt}</span>`;
  b.onclick=()=>{if(active.has(t)){active.delete(t);b.setAttribute("aria-pressed","false");}
    else{active.add(t);b.setAttribute("aria-pressed","true");}
    if(selected)renderPanel(selected);render();};fbox.appendChild(b);});

const tip=document.getElementById("tip");
function showTip(e,l){tip.innerHTML=`<b>${esc(l.s.label)} ${l.directed?"→":"—"} ${esc(l.t.label)}</b> · ${elab(l.evidence_type)}<br>${rlab(l.relation)} · ${esc(l.species)}<div class="tq">"${esc(l.quote)}"</div>`;tip.style.opacity=1;moveTip(e);}
function showNodeTip(e,n){if(drag)return;tip.innerHTML=`<b>${esc(n.zh||n.full)}</b><br><span style="opacity:.8">${esc(n.full)}${n.acr?" · "+esc(n.acr):""}</span><br>${n.type==="region"?"脑区":"细胞类型/功能"} · 度 ${n.deg}`;tip.style.opacity=1;moveTip(e);}
function moveTip(e){tip.style.left=Math.min(e.clientX+14,innerWidth-290)+"px";tip.style.top=(e.clientY+14)+"px";}
function hideTip(){tip.style.opacity=0;}

document.getElementById("foot").innerHTML=
  `<span>${N.length} 个节点 · ${links.length} 条连接</span>`+
  `<span class="lg"><span class="sh"></span>脑区</span>`+
  `<span class="lg"><span class="sh dia"></span>功能/细胞</span>`+
  `<span class="lg"><span class="ln"></span>有向(投射/调制)</span>`+
  `<span class="lg"><span class="ln dash"></span>减弱</span>`+
  `<span class="spacer" style="flex:1"></span><span>数据来源 PubMed 摘要抽取 · 滚轮缩放/双击复位 · 拖动空白平移 · 点击空白恢复概览</span>`;

document.getElementById("themeBtn").onclick=()=>{const cur=document.documentElement.getAttribute("data-theme")
  ||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  document.documentElement.setAttribute("data-theme",cur==="dark"?"light":"dark");};

let anim=null;
let layoutReady=false;
let stablePasses=0;
const MIN_LAYOUT_W=360;
const MIN_LAYOUT_H=260;

function resize(){
  const r=svg.getBoundingClientRect();
  W=r.width>50?r.width:900;
  H=r.height>50?r.height:600;
  resetZoom();
}

function seedNodes(){
  N.forEach((n,i)=>{const a=i/N.length*6.28;
    n.x=W/2+Math.cos(a)*Math.min(W,H)*0.39;
    n.y=H/2+Math.sin(a)*Math.min(W,H)*0.34;
    n.vx=0;n.vy=0;n.fx=null;n.fy=null;
  });
}

function runLayout(){
  seedNodes();
  simulate(720);
  fitView(68,66,44);
  render();
  layoutReady=true;
}

function initWhenStable(){
  resize();
  if(W<MIN_LAYOUT_W||H<MIN_LAYOUT_H){requestAnimationFrame(initWhenStable);return;}
  stablePasses+=1;
  if(stablePasses<2){requestAnimationFrame(initWhenStable);return;}
  runLayout();
}

addEventListener("resize",()=>{
  const oW=W,oH=H;
  resize();
  if(!layoutReady)return;

  const sx=oW>1?W/oW:1;
  const sy=oH>1?H/oH:1;
  const majorResize=sx>1.2||sx<0.84||sy>1.2||sy<0.84;
  if(majorResize){runLayout();return;}

  if(oW>50&&oH>50)N.forEach(n=>{n.x*=sx;n.y*=sy;});
  render();
});

requestAnimationFrame(()=>requestAnimationFrame(initWhenStable));
</script>
