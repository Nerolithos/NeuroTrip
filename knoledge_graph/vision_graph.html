  .btn:hover{border-color:var(--accent)}
  main{flex:1 1 auto;display:flex;min-height:0}
  .canvas-wrap{position:relative;flex:1 1 auto;min-width:0}
  svg{width:100%;height:100%;display:block;touch-action:none}
  .edge{fill:none;stroke-width:1.7;opacity:.7;transition:opacity .15s,stroke-width .15s}
  .edge.dim{opacity:.05}
  .edge.hot{opacity:1;stroke-width:3.2}
  .node .shp{stroke:var(--panel);stroke-width:2;cursor:grab;fill:var(--node)}

    stroke:var(--panel);stroke-width:3px;stroke-linejoin:round}
  .node.dim{opacity:.12}
  .node.sel .shp{stroke:var(--accent);stroke-width:3.5}

    border-radius:9px;padding:10px 12px;margin-bottom:9px;background:var(--panel-2)}

  .badge{display:inline-block;font-size:10.5px;font-weight:650;padding:2px 7px;border-radius:5px;color:#fff;background:var(--c,var(--muted))}
  .meta{margin-top:6px;font-size:11.5px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center}

  selective_for:"选择性",necessary_for:"必需",involved_in:"参与"};
const ecol=t=>ECOL[t]||ECOL.other, elab=t=>ELAB[t]||t, rlab=r=>RLAB[r]||r;

const nodeById={};
const N=G.nodes.map(nd=>{const o=Object.assign({},nd,{deg:0,x:0,y:0,vx:0,vy:0,fx:null,fy:null});nodeById[nd.id]=o;return o;});
const links=G.links.map(l=>Object.assign({},l,{s:nodeById[l.s],t:nodeById[l.t]})).filter(l=>l.s&&l.t);
links.forEach(l=>{l.s.deg++;l.t.deg++;});
const ETYPES=[...new Set(links.map(l=>l.evidence_type))].sort((a,b)=>
  links.filter(l=>l.evidence_type===b).length-links.filter(l=>l.evidence_type===a).length);
const active=new Set(ETYPES);
let selected=null;

const svg=document.getElementById("svg"),SVGNS="http://www.w3.org/2000/svg";
let W=900,H=600;
const defs=document.createElementNS(SVGNS,"defs");
ETYPES.forEach(t=>{const m=document.createElementNS(SVGNS,"marker");
  m.setAttribute("id","arw-"+t);m.setAttribute("viewBox","0 0 10 10");m.setAttribute("refX","9");
  m.setAttribute("refY","5");m.setAttribute("markerWidth","6");m.setAttribute("markerHeight","6");
  m.setAttribute("orient","auto-start-reverse");
  const p=document.createElementNS(SVGNS,"path");p.setAttribute("d","M0 0 L10 5 L0 10 z");
  p.setAttribute("fill",ecol(t));m.appendChild(p);defs.appendChild(m);});
svg.appendChild(defs);
const gEdges=document.createElementNS(SVGNS,"g"),gNodes=document.createElementNS(SVGNS,"g");
svg.appendChild(gEdges);svg.appendChild(gNodes);

const edgeEls=links.map(l=>{const p=document.createElementNS(SVGNS,"path");
  p.setAttribute("class","edge");p.setAttribute("stroke",ecol(l.evidence_type));
  if(l.directed)p.setAttribute("marker-end","url(#arw-"+l.evidence_type+")");
  if(l.direction==="decrease")p.setAttribute("stroke-dasharray","5 4");
  p.addEventListener("mouseenter",e=>showTip(e,l));p.addEventListener("mousemove",moveTip);
  p.addEventListener("mouseleave",hideTip);gEdges.appendChild(p);return p;});
N.forEach(n=>{const g=document.createElementNS(SVGNS,"g");g.setAttribute("class","node");
  const r=6+Math.min(n.deg,8)*1.5;let shp;
  if(n.type==="region"){shp=document.createElementNS(SVGNS,"circle");shp.setAttribute("r",r);}
  else{shp=document.createElementNS(SVGNS,"rect");const s=r*1.7;shp.setAttribute("x",-s/2);
    shp.setAttribute("y",-s/2);shp.setAttribute("width",s);shp.setAttribute("height",s);
    shp.setAttribute("transform","rotate(45)");shp.setAttribute("rx",1.5);}
  shp.setAttribute("class","shp");
  g.appendChild(shp);
  if(n.deg>=2){const t=document.createElementNS(SVGNS,"text");t.setAttribute("text-anchor","middle");
    t.setAttribute("dy",-(r+4));t.textContent=n.label;g.appendChild(t);}   // 叶子节点不常显标签，悬停再显
  gNodes.appendChild(g);
  g.addEventListener("pointerdown",e=>startDrag(e,n,g));g.addEventListener("click",()=>select(n));
  g.addEventListener("mouseenter",e=>showNodeTip(e,n));g.addEventListener("mousemove",moveTip);
  g.addEventListener("mouseleave",hideTip);
  n._g=g;});

function simulate(iter){for(let k=0;k<iter;k++){
  for(const a of N){for(const b of N){if(a===b)continue;
    let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+.01,d=Math.sqrt(d2);const rep=5200/d2;
    a.vx+=dx/d*rep;a.vy+=dy/d*rep;}
    a.vx+=(W/2-a.x)*.004;a.vy+=(H/2-a.y)*.004;}
  for(const l of links){let dx=l.t.x-l.s.x,dy=l.t.y-l.s.y,d=Math.sqrt(dx*dx+dy*dy)+.01;
    const f=(d-95)*.02;l.s.vx+=dx/d*f;l.s.vy+=dy/d*f;l.t.vx-=dx/d*f;l.t.vy-=dy/d*f;}
  for(const a of N){if(a.fx!=null){a.x=a.fx;a.y=a.fy;a.vx=a.vy=0;continue;}
    a.x+=a.vx*.5;a.y+=a.vy*.5;a.vx*=.82;a.vy*=.82;}}}   // 不硬夹边界，交给 fitView 缩放到视口

function fitView(padT,padX,padB){
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const n of N){x0=Math.min(x0,n.x);x1=Math.max(x1,n.x);y0=Math.min(y0,n.y);y1=Math.max(y1,n.y);}
  const gw=Math.max(x1-x0,1),gh=Math.max(y1-y0,1);
  const s=Math.min((W-2*padX)/gw,(H-padT-padB)/gh);
  const ox=(W-gw*s)/2-x0*s, oy=padT-y0*s;
  for(const n of N){n.x=n.x*s+ox;n.y=n.y*s+oy;}
}

function render(){
  links.forEach((l,i)=>{const on=active.has(l.evidence_type),rel=selected&&(l.s===selected||l.t===selected);
    const e=edgeEls[i];e.style.display=on?"":"none";
    e.setAttribute("class","edge"+(!on?"":selected?(rel?" hot":" dim"):""));
    const sx=l.s.x,sy=l.s.y,tx=l.t.x,ty=l.t.y,mx=(sx+tx)/2,my=(sy+ty)/2,dx=tx-sx,dy=ty-sy,nl=Math.hypot(dx,dy)||1;
    const cx=mx-dy/nl*16,cy=my+dx/nl*16;e.setAttribute("d",`M${sx} ${sy} Q${cx} ${cy} ${tx} ${ty}`);});
  N.forEach(n=>{const vis=links.some(l=>(l.s===n||l.t===n)&&active.has(l.evidence_type));
    n._g.style.display=vis?"":"none";let cls="node";
    if(selected){if(n===selected)cls+=" sel";
      else if(!links.some(l=>active.has(l.evidence_type)&&((l.s===selected&&l.t===n)||(l.t===selected&&l.s===n))))cls+=" dim";}
    n._g.setAttribute("class",cls);n._g.setAttribute("transform",`translate(${n.x} ${n.y})`);});
}

let drag=null;
function startDrag(e,n,g){e.stopPropagation();drag={n,g};g.classList.add("dragging");
  n.fx=n.x;n.fy=n.y;g.setPointerCapture(e.pointerId);}
svg.addEventListener("pointermove",e=>{if(!drag)return;const pt=toSvg(e.clientX,e.clientY);
  drag.n.x=drag.n.fx=pt.x;drag.n.y=drag.n.fy=pt.y;render();});
svg.addEventListener("pointerup",()=>{if(!drag)return;drag.g.classList.remove("dragging");
  drag.n.fx=drag.n.fy=null;drag=null;});   // 释放即停留，不再重排，保持已适配好的布局
function toSvg(cx,cy){const r=svg.getBoundingClientRect();return{x:(cx-r.left)/r.width*W,y:(cy-r.top)/r.height*H};}

function select(n){selected=n;render();renderPanel(n);}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function renderPanel(n){
  const out=links.filter(l=>l.s===n&&active.has(l.evidence_type));
  const inc=links.filter(l=>l.t===n&&active.has(l.evidence_type));
  const card=(l,incoming)=>{const other=incoming?l.s:l.t,c=ecol(l.evidence_type);
    const dirTag=l.direction==="increase"?`<span class="dir up">▲ 增强</span>`:
      l.direction==="decrease"?`<span class="dir down">▼ 减弱</span>`:"";
    return `<div class="edge-card" style="--c:${c}">
      <div class="flow"><span>${esc(l.s.label)}</span>
        <span class="arr">${l.directed?"→":"—"}</span><span>${esc(l.t.label)}</span>
        <span class="badge" style="--c:${c}">${elab(l.evidence_type)}</span></div>
      <div class="rel">${rlab(l.relation)}${dirTag?" · ":""}</div>
      <div class="meta">${dirTag}<span>${esc(l.species)}</span>
        ${l.confidence!=null?`<span>conf ${l.confidence}</span>`:""}
        <a class="pmid" href="https://pubmed.ncbi.nlm.nih.gov/${l.pmid}/" target="_blank" rel="noopener">PMID ${l.pmid}</a></div>
      <p class="quote">"${esc(l.quote)}"</p></div>`;};
  document.getElementById("aside").innerHTML=`
    <h2 class="region-name">${esc(n.zh||n.full)}</h2>
    <div class="region-sub mono">${esc(n.full)}${n.acr?" · "+esc(n.acr):""} · ${n.type==="region"?"脑区":"细胞类型/功能"}</div>
    <div class="kv"><span>输出 ${out.length}</span><span>输入 ${inc.length}</span><span>度 ${n.deg}</span></div>
    ${out.length?`<div class="grp-h">输出连接 · OUTGOING</div>${out.map(l=>card(l,false)).join("")}`:""}
    ${inc.length?`<div class="grp-h">输入连接 · INCOMING</div>${inc.map(l=>card(l,true)).join("")}`:""}
    ${!out.length&&!inc.length?`<div class="panel-empty">当前过滤下无可见连接</div>`:""}`;
}

const fbox=document.getElementById("filters");
ETYPES.forEach(t=>{const cnt=links.filter(l=>l.evidence_type===t).length;
  const b=document.createElement("button");b.className="chip";b.type="button";
  b.setAttribute("aria-pressed","true");b.style.setProperty("--c",ecol(t));
  b.innerHTML=`<span class="dot"></span>${elab(t)} <span style="color:var(--muted)">${cnt}</span>`;
  b.onclick=()=>{if(active.has(t)){active.delete(t);b.setAttribute("aria-pressed","false");}
    else{active.add(t);b.setAttribute("aria-pressed","true");}
    if(selected)renderPanel(selected);render();};fbox.appendChild(b);});

const tip=document.getElementById("tip");
function showTip(e,l){tip.innerHTML=`<b>${esc(l.s.label)} ${l.directed?"→":"—"} ${esc(l.t.label)}</b> · ${elab(l.evidence_type)}<br>${rlab(l.relation)} · ${esc(l.species)}<div class="tq">"${esc(l.quote)}"</div>`;tip.style.opacity=1;moveTip(e);}
function showNodeTip(e,n){if(drag)return;tip.innerHTML=`<b>${esc(n.zh||n.full)}</b><br><span style="opacity:.8">${esc(n.full)}${n.acr?" · "+esc(n.acr):""}</span><br>${n.type==="region"?"脑区":"细胞类型/功能"} · 度 ${n.deg}`;tip.style.opacity=1;moveTip(e);}
function moveTip(e){tip.style.left=Math.min(e.clientX+14,innerWidth-290)+"px";tip.style.top=(e.clientY+14)+"px";}
function hideTip(){tip.style.opacity=0;}

document.getElementById("foot").innerHTML=
  `<span>${N.length} 个节点 · ${links.length} 条连接</span>`+
  `<span class="lg"><span class="sh"></span>脑区</span>`+
  `<span class="lg"><span class="sh dia"></span>细胞类型</span>`+
  `<span class="lg"><span class="ln"></span>有向(投射/调制)</span>`+
  `<span class="lg"><span class="ln dash"></span>减弱</span>`+
  `<span class="spacer" style="flex:1"></span><span>数据来源 PubMed 摘要抽取 · 点节点看证据引文与 PMID</span>`;

document.getElementById("themeBtn").onclick=()=>{const cur=document.documentElement.getAttribute("data-theme")
  ||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  document.documentElement.setAttribute("data-theme",cur==="dark"?"light":"dark");};

let anim=null;
function resize(){const r=svg.getBoundingClientRect();W=r.width>50?r.width:900;H=r.height>50?r.height:600;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);}
function init(){resize();N.forEach((n,i)=>{const a=i/N.length*6.28;
  n.x=W/2+Math.cos(a)*Math.min(W,H)*0.35;n.y=H/2+Math.sin(a)*Math.min(W,H)*0.3;});
  simulate(450);fitView(56,54,34);render();}
addEventListener("resize",()=>{const oW=W,oH=H;resize();if(oW>50&&oH>50)N.forEach(n=>{n.x*=W/oW;n.y*=H/oH;});render();});
requestAnimationFrame(()=>requestAnimationFrame(init));
</script>
