const DINFO=[{"key": "vision", "label": "视觉", "color": "#dd9a2f"}, {"key": "language", "label": "语言", "color": "#1f9e97"}, {"key": "memory", "label": "记忆", "color": "#4f7fe0"}, {"key": "fear", "label": "恐惧", "color": "#e05a58"}, {"key": "sleep", "label": "睡眠", "color": "#9c76d8"}];                 // [{key,label,color}]
const DCOL={}, DLAB={};
DINFO.forEach(d=>{DCOL[d.key]=d.color;DLAB[d.key]=d.label;});
const ELAB={anatomical_projection:"解剖投射",functional_connectivity:"功能连接",causal_manipulation:"因果操纵",
  structural_connectivity:"结构连接",coactivation:"共激活",lesion_deficit:"损伤缺陷",correlation:"相关性",other:"其他"};
const RLAB={projects_to:"投射至",connected_with:"连接",modulates:"调制",encodes:"编码",
  selective_for:"选择性",necessary_for:"必需",involved_in:"参与",correlated_with:"相关"};
const dlab=k=>DLAB[k]||k, dcol=k=>DCOL[k]||"#8a93a3", elab=t=>ELAB[t]||t, rlab=r=>RLAB[r]||r;

const nodeById={};
const N=G.nodes.map(nd=>{const o=Object.assign({},nd,{deg:0,x:0,y:0,vx:0,vy:0,fx:null,fy:null});nodeById[nd.id]=o;return o;});
const links=G.links.map(l=>Object.assign({},l,{s:nodeById[l.s],t:nodeById[l.t]})).filter(l=>l.s&&l.t);
links.forEach(l=>{l.s.deg++;l.t.deg++;});
const ETYPES=[...new Set(links.map(l=>l.evidence_type))].sort((a,b)=>
  links.filter(l=>l.evidence_type===b).length-links.filter(l=>l.evidence_type===a).length);
const activeDom=new Set(DINFO.map(d=>d.key));
const activeEv=new Set(ETYPES);
let selected=null;

const svg=document.getElementById("svg"),SVGNS="http://www.w3.org/2000/svg";
let W=1000,H=650;
const defs=document.createElementNS(SVGNS,"defs");
DINFO.forEach(d=>{const m=document.createElementNS(SVGNS,"marker");
  m.setAttribute("id","arw-"+d.key);m.setAttribute("viewBox","0 0 10 10");m.setAttribute("refX","9");
  m.setAttribute("refY","5");m.setAttribute("markerWidth","6");m.setAttribute("markerHeight","6");
  m.setAttribute("orient","auto-start-reverse");
  const p=document.createElementNS(SVGNS,"path");p.setAttribute("d","M0 0 L10 5 L0 10 z");
  p.setAttribute("fill",d.color);m.appendChild(p);defs.appendChild(m);});
svg.appendChild(defs);
const viewport=document.createElementNS(SVGNS,"g");svg.appendChild(viewport);   // 缩放/平移容器
const gEdges=document.createElementNS(SVGNS,"g"),gNodes=document.createElementNS(SVGNS,"g");
viewport.appendChild(gEdges);viewport.appendChild(gNodes);

function nodeR(n){return 5+Math.min(n.deg,10)*1.2+(n.domains.length-1)*3;}
function nodeFill(n){return n.domains.length>1?"var(--cross)":dcol(n.domains[0]);}

const edgeEls=links.map(l=>{const p=document.createElementNS(SVGNS,"path");
  p.setAttribute("class","edge");p.setAttribute("stroke",dcol(l.domain));
  if(l.directed)p.setAttribute("marker-end","url(#arw-"+l.domain+")");
  if(l.direction==="decrease")p.setAttribute("stroke-dasharray","5 4");
  p.addEventListener("mouseenter",e=>showTip(e,l));p.addEventListener("mousemove",moveTip);
  p.addEventListener("mouseleave",hideTip);gEdges.appendChild(p);return p;});
N.forEach(n=>{const g=document.createElementNS(SVGNS,"g");
  g.setAttribute("class","node"+(n.domains.length>1?" cross":""));
  const r=nodeR(n);let shp;
  if(n.type==="region"){shp=document.createElementNS(SVGNS,"circle");shp.setAttribute("r",r);}
  else{shp=document.createElementNS(SVGNS,"rect");const s=r*1.7;shp.setAttribute("x",-s/2);
    shp.setAttribute("y",-s/2);shp.setAttribute("width",s);shp.setAttribute("height",s);
    shp.setAttribute("transform","rotate(45)");shp.setAttribute("rx",1.5);}
  shp.setAttribute("class","shp");shp.setAttribute("fill",nodeFill(n));
  g.appendChild(shp);
  if(n.deg>=3||n.domains.length>1){const t=document.createElementNS(SVGNS,"text");
    t.setAttribute("text-anchor","middle");t.setAttribute("dy",-(r+4));t.textContent=n.label;g.appendChild(t);}
  gNodes.appendChild(g);
  g.addEventListener("pointerdown",e=>startDrag(e,n,g));g.addEventListener("click",()=>select(n));
  g.addEventListener("mouseenter",e=>showNodeTip(e,n));g.addEventListener("mousemove",moveTip);
  g.addEventListener("mouseleave",hideTip);
  n._g=g;});

const REP=2600+N.length*35;
function simulate(iter,useCenter){for(let k=0;k<iter;k++){
  for(const a of N){for(const b of N){if(a===b)continue;
    let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+.01,d=Math.sqrt(d2);const rep=REP/d2;
    a.vx+=dx/d*rep;a.vy+=dy/d*rep;}
    if(useCenter){a.vx+=(W/2-a.x)*.003;a.vy+=(H/2-a.y)*.003;}}
  for(const l of links){let dx=l.t.x-l.s.x,dy=l.t.y-l.s.y,d=Math.sqrt(dx*dx+dy*dy)+.01;
    const f=(d-70)*.02;l.s.vx+=dx/d*f;l.s.vy+=dy/d*f;l.t.vx-=dx/d*f;l.t.vy-=dy/d*f;}
  for(const a of N){if(a.fx!=null){a.x=a.fx;a.y=a.fy;a.vx=a.vy=0;continue;}
    a.x+=a.vx*.5;a.y+=a.vy*.5;a.vx*=.82;a.vy*=.82;}}}

// ---- 解剖布局：有坐标脑区钉到矢状面，功能/无坐标节点松弛漂浮到相邻脑区旁 ----
let layoutMode="force", anim=null;
const HAS_COORD=N.some(n=>n.ax0!=null);
function setLayout(mode){
  layoutMode=mode;clearInterval(anim);
  document.getElementById("layoutBtn").textContent=mode==="force"?"解剖布局":"力导向布局";
  if(mode==="anatomy"){
    const co=N.filter(n=>n.ax0!=null);
    const a0=co.map(n=>n.ax0),a1=co.map(n=>n.ax1);
    const x0=Math.min(...a0),x1=Math.max(...a0),y0=Math.min(...a1),y1=Math.max(...a1);
    const pX=64,pT=54,pB=44;
    co.forEach(n=>{n.fx=pX+(n.ax0-x0)/((x1-x0)||1)*(W-2*pX);      // AP→左右
      n.fy=pT+(n.ax1-y0)/((y1-y0)||1)*(H-pT-pB);                 // DV→上下(背侧在上)
      n.x=n.fx;n.y=n.fy;});
    N.filter(n=>n.ax0==null).forEach(n=>{                         // 无坐标：落到相邻脑区质心附近
      const nb=links.filter(l=>l.s===n||l.t===n).map(l=>l.s===n?l.t:l.s).filter(m=>m.fx!=null);
      if(nb.length){n.x=nb.reduce((s,m)=>s+m.x,0)/nb.length+(Math.random()-.5)*40;
        n.y=nb.reduce((s,m)=>s+m.y,0)/nb.length+(Math.random()-.5)*40;}
      else{n.x=W*(0.1+0.8*Math.random());n.y=H*(0.1+0.8*Math.random());}
      n.fx=n.fy=null;});
    let s=0;anim=setInterval(()=>{simulate(2,false);render();if(++s>70)clearInterval(anim);},16);
  }else{
    N.forEach(n=>{n.fx=n.fy=null;});
    let s=0;anim=setInterval(()=>{simulate(3,true);render();if(++s>110)clearInterval(anim);},16);
  }
}
function fitView(padT,padX,padB){let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const n of N){x0=Math.min(x0,n.x);x1=Math.max(x1,n.x);y0=Math.min(y0,n.y);y1=Math.max(y1,n.y);}
  const gw=Math.max(x1-x0,1),gh=Math.max(y1-y0,1),s=Math.min((W-2*padX)/gw,(H-padT-padB)/gh);
  const ox=(W-gw*s)/2-x0*s, oy=padT-y0*s;for(const n of N){n.x=n.x*s+ox;n.y=n.y*s+oy;}}

function edgeOn(l){return activeDom.has(l.domain)&&activeEv.has(l.evidence_type);}
function render(){
  links.forEach((l,i)=>{const on=edgeOn(l),rel=selected&&(l.s===selected||l.t===selected);
    const e=edgeEls[i];e.style.display=on?"":"none";
    e.setAttribute("class","edge"+(!on?"":selected?(rel?" hot":" dim"):""));
    const sx=l.s.x,sy=l.s.y,tx=l.t.x,ty=l.t.y,mx=(sx+tx)/2,my=(sy+ty)/2,dx=tx-sx,dy=ty-sy,nl=Math.hypot(dx,dy)||1;
    const cx=mx-dy/nl*14,cy=my+dx/nl*14;e.setAttribute("d",`M${sx} ${sy} Q${cx} ${cy} ${tx} ${ty}`);});
  N.forEach(n=>{const vis=links.some(l=>(l.s===n||l.t===n)&&edgeOn(l));
    n._g.style.display=vis?"":"none";let cls="node"+(n.domains.length>1?" cross":"");
    if(selected){if(n===selected)cls+=" sel";
      else if(!links.some(l=>edgeOn(l)&&((l.s===selected&&l.t===n)||(l.t===selected&&l.s===n))))cls+=" dim";}
    n._g.setAttribute("class",cls);n._g.setAttribute("transform",`translate(${n.x} ${n.y})`);});
}

// ---- 缩放 / 平移 ----
let vt={x:0,y:0,k:1};
function applyVT(){viewport.setAttribute("transform",`translate(${vt.x} ${vt.y}) scale(${vt.k})`);}
function toVB(cx,cy){const r=svg.getBoundingClientRect();return{x:(cx-r.left)/r.width*W,y:(cy-r.top)/r.height*H};}
function toSvg(cx,cy){const v=toVB(cx,cy);return{x:(v.x-vt.x)/vt.k,y:(v.y-vt.y)/vt.k};}  // 客户端->世界坐标
function zoomAt(cx,cy,factor){const v=toVB(cx,cy),nk=Math.max(0.2,Math.min(6,vt.k*factor));
  const wx=(v.x-vt.x)/vt.k,wy=(v.y-vt.y)/vt.k;vt.k=nk;vt.x=v.x-wx*nk;vt.y=v.y-wy*nk;applyVT();}  // 定点缩放
function resetView(){vt={x:0,y:0,k:1};applyVT();}
svg.addEventListener("wheel",e=>{e.preventDefault();zoomAt(e.clientX,e.clientY,Math.exp(-e.deltaY*0.0015));},{passive:false});
svg.addEventListener("dblclick",resetView);

// ---- 拖节点 / 拖背景平移 ----
let drag=null, pan=null;
function startDrag(e,n,g){e.stopPropagation();drag={n,g};g.classList.add("dragging");
  n.fx=n.x;n.fy=n.y;g.setPointerCapture(e.pointerId);}
svg.addEventListener("pointerdown",e=>{if(drag)return;      // 空白处按下=平移（节点已 stopPropagation）
  pan={x:e.clientX,y:e.clientY,vx:vt.x,vy:vt.y};svg.setPointerCapture(e.pointerId);svg.classList.add("panning");});
svg.addEventListener("pointermove",e=>{
  if(drag){const pt=toSvg(e.clientX,e.clientY);drag.n.x=drag.n.fx=pt.x;drag.n.y=drag.n.fy=pt.y;render();return;}
  if(pan){const r=svg.getBoundingClientRect();
    vt.x=pan.vx+(e.clientX-pan.x)/r.width*W;vt.y=pan.vy+(e.clientY-pan.y)/r.height*H;applyVT();}});
svg.addEventListener("pointerup",()=>{
  if(drag){drag.g.classList.remove("dragging");drag.n.fx=drag.n.fy=null;drag=null;}
  if(pan){pan=null;svg.classList.remove("panning");}});

function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function domBadges(doms){return doms.map(d=>`<span class="dbadge" style="--c:${dcol(d)}">${dlab(d)}</span>`).join("");}
function select(n){selected=n;render();renderPanel(n);}
function renderPanel(n){
  const out=links.filter(l=>l.s===n&&edgeOn(l)), inc=links.filter(l=>l.t===n&&edgeOn(l));
  const card=l=>{const c=dcol(l.domain);
    const dirTag=l.direction==="increase"?`<span class="dir" style="color:#c2472f">▲</span>`:
      l.direction==="decrease"?`<span class="dir" style="color:#2f7dc2">▼</span>`:"";
    return `<div class="edge-card" style="--c:${c}">
      <div class="flow"><span>${esc(l.s.label)}</span><span class="arr">${l.directed?"→":"—"}</span><span>${esc(l.t.label)}</span>
        <span class="badge" style="--c:${c}">${dlab(l.domain)}</span></div>
      <div class="rel">${rlab(l.relation)} ${dirTag} <span class="ev">${elab(l.evidence_type)}</span></div>
      <div class="meta"><span>${esc(l.species)}</span>${l.confidence!=null?`<span>conf ${l.confidence}</span>`:""}
        <a class="pmid" href="https://pubmed.ncbi.nlm.nih.gov/${l.pmid}/" target="_blank" rel="noopener">PMID ${l.pmid}</a></div>
      <p class="quote">"${esc(l.quote)}"</p></div>`;};
  document.getElementById("aside").innerHTML=`
    <h2 class="region-name">${esc(n.zh||n.full)}</h2>
    <div class="region-sub mono">${esc(n.full)}${n.acr?" · "+esc(n.acr):""} · ${n.type==="region"?"脑区":"功能/细胞"}</div>
    <div class="dbadges">${domBadges(n.domains)}</div>
    <div class="kv"><span>跨 ${n.domains.length} 域</span><span>输出 ${out.length}</span><span>输入 ${inc.length}</span><span>度 ${n.deg}</span></div>
    ${out.length?`<div class="grp-h">输出连接</div>${out.map(card).join("")}`:""}
    ${inc.length?`<div class="grp-h">输入连接</div>${inc.map(card).join("")}`:""}
    ${!out.length&&!inc.length?`<div class="region-sub">当前过滤下无可见连接</div>`:""}`;
}
function renderHubs(){
  const hubs=N.filter(n=>n.domains.length>=2).sort((a,b)=>
    b.domains.length-a.domains.length||b.deg-a.deg);
  document.getElementById("aside").innerHTML=`
    <h2 class="region-name">跨域枢纽</h2>
    <div class="region-sub">出现在 2 个及以上功能域的脑区/功能 —— 点击查看它的跨域连接</div>
    ${hubs.map(n=>`<div class="hub" data-id="${esc(n.id)}">
      <span class="hn">${esc(n.zh||n.full)}</span>
      <span class="hd">${n.domains.map(d=>`<i style="background:${dcol(d)}"></i>`).join("")}</span>
      <span class="hc">${n.domains.length}域</span></div>`).join("")
      || '<div class="region-sub">当前过滤下无跨域节点</div>'}`;
  document.querySelectorAll(".hub").forEach(el=>el.onclick=()=>select(nodeById[el.dataset.id]));
}

function mkChip(box,label,color,on,toggle){const b=document.createElement("button");
  b.className="chip";b.type="button";b.setAttribute("aria-pressed",on?"true":"false");
  b.style.setProperty("--c",color);b.innerHTML=`<span class="dot"></span>${label}`;
  b.onclick=()=>{const now=toggle();b.setAttribute("aria-pressed",now?"true":"false");
    if(selected)renderPanel(selected);else renderHubs();render();};box.appendChild(b);}
const domBox=document.getElementById("domFilters"), evBox=document.getElementById("evFilters");
DINFO.forEach(d=>{const cnt=links.filter(l=>l.domain===d.key).length;
  mkChip(domBox,`${d.label} ${cnt}`,d.color,true,()=>{
    if(activeDom.has(d.key)){activeDom.delete(d.key);return false;}activeDom.add(d.key);return true;});});
ETYPES.forEach(t=>{const cnt=links.filter(l=>l.evidence_type===t).length;
  mkChip(evBox,`${elab(t)} ${cnt}`,"#8a93a3",true,()=>{
    if(activeEv.has(t)){activeEv.delete(t);return false;}activeEv.add(t);return true;});});

const tip=document.getElementById("tip");
function showTip(e,l){tip.innerHTML=`<b>${esc(l.s.label)} ${l.directed?"→":"—"} ${esc(l.t.label)}</b> · <span style="color:${dcol(l.domain)}">${dlab(l.domain)}</span><br>${rlab(l.relation)} · ${elab(l.evidence_type)} · ${esc(l.species)}<div class="tq">"${esc(l.quote)}"</div>`;tip.style.opacity=1;moveTip(e);}
function showNodeTip(e,n){if(drag)return;tip.innerHTML=`<b>${esc(n.zh||n.full)}</b><br><span style="opacity:.8">${esc(n.full)}${n.acr?" · "+esc(n.acr):""}</span><br>${n.type==="region"?"脑区":"功能/细胞"} · 跨 ${n.domains.length} 域 · 度 ${n.deg}`;tip.style.opacity=1;moveTip(e);}
function moveTip(e){tip.style.left=Math.min(e.clientX+14,innerWidth-290)+"px";tip.style.top=(e.clientY+14)+"px";}
function hideTip(){tip.style.opacity=0;}

const crossN=N.filter(n=>n.domains.length>1).length;
document.getElementById("foot").innerHTML=
  `<span>${N.length} 节点 · ${links.length} 连接 · <b style="color:var(--cross)">${crossN} 跨域枢纽</b></span>`+
  `<span class="lg"><span class="sh"></span>脑区</span>`+
  `<span class="lg"><span class="sh dia"></span>功能/细胞</span>`+
  `<span class="lg"><span class="sh cr"></span>跨域(越大跨越域越多)</span>`+
  `<span class="spacer" style="flex:1"></span><span>滚轮缩放 · 拖背景平移 · 双击复位 · 数据来源 PubMed 摘要抽取</span>`;

document.getElementById("themeBtn").onclick=()=>{const cur=document.documentElement.getAttribute("data-theme")
  ||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  document.documentElement.setAttribute("data-theme",cur==="dark"?"light":"dark");};
const layoutBtn=document.getElementById("layoutBtn");
if(!HAS_COORD){layoutBtn.disabled=true;layoutBtn.title="无可用脑区坐标";layoutBtn.style.opacity=.4;}
layoutBtn.onclick=()=>setLayout(layoutMode==="force"?"anatomy":"force");
function zoomCenter(f){const r=svg.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,f);}
document.getElementById("zoomInBtn").onclick=()=>zoomCenter(1.3);
document.getElementById("zoomOutBtn").onclick=()=>zoomCenter(1/1.3);
document.getElementById("resetBtn").onclick=resetView;

function resize(){const r=svg.getBoundingClientRect();W=r.width>50?r.width:1000;H=r.height>50?r.height:650;
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);}
function init(){resize();N.forEach((n,i)=>{const a=i/N.length*6.28;
  n.x=W/2+Math.cos(a)*Math.min(W,H)*0.4;n.y=H/2+Math.sin(a)*Math.min(W,H)*0.35;});
  simulate(700);fitView(50,50,30);render();renderHubs();}
addEventListener("resize",()=>{const oW=W,oH=H;resize();if(oW>50&&oH>50)N.forEach(n=>{n.x*=W/oW;n.y*=H/oH;});render();});
requestAnimationFrame(()=>requestAnimationFrame(init));
</script>
