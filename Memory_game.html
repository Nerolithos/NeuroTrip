<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房间 · 你记得的那间屋子，比它好看</title>
<style>
  :root{
    --bg:#f6f1e8; --panel:#fbf7f0;
    --ink:#433d34; --dim:#7c7266; --faint:#a89e90;
    --ok:#2f9e86; --bad:#cf5a4e; --plant:#dd7a34; --other:#7a6cc9;
    --wall:#f1e9da; --wall2:#eae0ce; --floor:#dcc9ab; --floor2:#d2bc9b;
    --serif:"Songti SC","SimSun","Source Han Serif SC","Noto Serif CJK SC",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(ellipse at 50% 26%,#faf6ef 0%,#f2ebdf 68%,#ece3d3 100%);
    color:var(--ink);font-family:var(--serif);overflow:hidden}
  #vig{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(ellipse at 50% 38%,rgba(255,255,255,0) 42%,rgba(196,178,148,.16) 100%)}
  #stage{position:fixed;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;
    padding:4vh 4vw;overflow-y:auto}
  #stage::-webkit-scrollbar{width:0}
  .panel{width:100%;max-width:820px;text-align:center;animation:rise .7s cubic-bezier(.2,.8,.3,1) both}
  .wide{max-width:1120px}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  h1{font-size:clamp(30px,6vw,52px);font-weight:400;letter-spacing:.3em;margin-bottom:24px}
  h2{font-size:clamp(17px,2.4vw,21px);font-weight:400;letter-spacing:.16em;color:var(--dim);margin-bottom:18px}
  p{line-height:2.05;font-size:15.5px;color:var(--dim);letter-spacing:.05em}
  .quote{font-size:clamp(16px,2.2vw,19px);line-height:2.2;color:var(--ink);letter-spacing:.08em}
  .hint{font-size:12px;color:var(--faint);letter-spacing:.14em;margin-top:12px}
  .sp{height:28px}.sp-s{height:16px}
  em{font-style:normal;color:var(--plant)}
  b{font-weight:400;color:var(--ink)}

  button{font-family:var(--serif);font-size:15px;letter-spacing:.18em;color:var(--ink);background:var(--panel);
    border:1px solid rgba(67,61,52,.18);padding:12px 30px;cursor:pointer;transition:.3s;
    border-radius:6px;box-shadow:0 2px 9px -5px rgba(120,100,70,.4)}
  button:hover:not(:disabled){background:#fff;border-color:rgba(67,61,52,.4);transform:translateY(-1px)}
  button:disabled{opacity:.35;cursor:default;box-shadow:none}
  button.ghost{color:var(--faint);border-color:rgba(120,110,95,.2);background:transparent;box-shadow:none;
    font-size:12px;padding:9px 18px;letter-spacing:.1em}
  button.sel{border-color:var(--ok);color:var(--ink);background:rgba(47,158,134,.09);
    box-shadow:0 0 0 2px rgba(47,158,134,.16)}
  .row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;align-items:center}

  /* ---- 房间：浅景深立体格柜（--tilt 控制倾角）---- */
  :root{--tilt:6deg}
  .room{
    position:relative;width:100%;aspect-ratio:5/3;max-height:50vh;margin:2.4vh auto 3vh;
    border-radius:10px;overflow:hidden;
    background:linear-gradient(180deg,#f3ecdd 0%,#efe6d4 60%);   /* 奶油墙 */
    display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(3,1fr);
    transform:perspective(1500px) rotateX(var(--tilt));
    transform-style:preserve-3d;
    border:2px solid #4a3f2e;                                   /* 漫画墨框 */
    box-shadow:
      0 7px 0 -1px #ceb593, 0 12px 0 -1px #c1a781,              /* 柜体下沿厚度 */
      0 40px 46px -22px rgba(120,90,55,.55);                    /* 落地投影 */
    transition:filter 1.1s ease;
  }
  .room::before{ /* 窗：天空 + 树影 + 十字窗棂 + 墨框 */
    content:"";position:absolute;left:5.5%;top:6%;width:23%;height:23%;z-index:0;pointer-events:none;
    background:
      linear-gradient(#5b5348,#5b5348) 50%/2px 100% no-repeat,
      linear-gradient(#5b5348,#5b5348) 50%/100% 2px no-repeat,
      linear-gradient(180deg,transparent 52%,#9ec48a 52% 74%,#cdb06a 74% 100%),
      linear-gradient(180deg,#bfe1f2 0%,#dcecec 55%);
    border:2.5px solid #4a3f2e;border-radius:2px;
    box-shadow:0 0 20px 5px rgba(255,244,210,.5);}
  .room::after{ /* 天花阴影，压出顶部纵深 */
    content:"";position:absolute;left:0;right:0;top:0;height:9%;z-index:0;
    background:linear-gradient(180deg,rgba(90,70,45,.13),transparent);pointer-events:none}
  .floor{ /* 木地板：板缝 + 踢脚墨线 */
    position:absolute;left:0;right:0;bottom:0;height:33%;z-index:0;pointer-events:none;
    background:
      repeating-linear-gradient(91deg, rgba(70,45,22,.22) 0 1.4px, transparent 1.4px, transparent 13.5%),
      linear-gradient(180deg,#ddbd8c,#c99c60);
    border-top:2px solid #4a3f2e;
    box-shadow:inset 0 4px 9px rgba(255,240,215,.35)}
  .art{ /* 墙上风景画：墨框 + 平涂青绿 */
    position:absolute;right:4%;top:8%;width:14%;height:19%;z-index:0;pointer-events:none;
    border:2.5px solid #4a3f2e;border-radius:2px;
    background:linear-gradient(160deg,#c3e2e6 0 38%,#84b09b 38% 68%,#5d8b78 68% 100%);
    box-shadow:0 4px 10px -3px rgba(80,55,30,.4)}
  .shelf{ /* 木搁板：板面 + 前沿厚度 + 墨线勾边 */
    position:absolute;left:1%;right:1%;height:12px;z-index:1;pointer-events:none;
    border:1.5px solid #4a3f2e;border-radius:2px 2px 3px 3px;
    background:linear-gradient(180deg,#ecdcbe 0%,#e1cba4 44%,#c8a97b 46%,#b58c60 100%);
    box-shadow:0 6px 12px -4px rgba(85,58,32,.42), inset 0 1px 0 rgba(255,252,244,.7)}
  .slot{position:relative;z-index:2;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px}
  .slot::before{ /* 物件落在板面的接触阴影 */
    content:"";position:absolute;left:22%;right:22%;bottom:2%;height:9%;border-radius:50%;
    background:rgba(85,58,32,.24);filter:blur(2.5px);opacity:0;transition:opacity .45s}
  .slot:has(svg)::before{opacity:1}
  .room.build .slot{cursor:pointer}
  .room.build .slot:hover{background:rgba(255,255,255,.4)}
  .room.build .slot.armed{box-shadow:inset 0 0 0 2px rgba(47,158,134,.55);background:rgba(47,158,134,.08)}
  .slot svg{width:56%;height:56%;max-width:76px;filter:drop-shadow(0 3px 3px rgba(120,95,60,.28));
    transition:opacity .55s ease,transform .55s ease}
  .slot.clr svg{opacity:0;transform:scale(.7)}
  .rwcap{min-height:48px;font-size:15px;color:var(--dim);letter-spacing:.08em;line-height:1.95;margin-top:20px}
  .rwcap b{color:var(--ink)} .rwcap em{color:var(--plant)}
  .slot .tag{position:absolute;bottom:4%;font-size:10px;letter-spacing:.1em;color:var(--faint)}

  /* 判定角标 */
  .slot.mk-ok    svg{outline:none} .slot.mk-ok::after{content:"";position:absolute;inset:6%;border:1px solid var(--ok);opacity:.55}
  .slot.mk-move::after{content:"";position:absolute;inset:6%;border:1px dashed var(--plant);opacity:.65}
  .slot.mk-new::after {content:"";position:absolute;inset:6%;border:1px solid var(--plant);
    box-shadow:0 0 22px -4px var(--plant);opacity:.9}
  .slot.mk-lost::after{content:"";position:absolute;inset:6%;border:1px dashed var(--bad);opacity:.5}
  .slot.mk-lost svg{opacity:.28}
  .slot.mk-other::after{content:"";position:absolute;inset:6%;border:1px solid var(--other);opacity:.7}

  /* ---- 托盘 ---- */
  .tray{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:18px}
  .chip{width:60px;height:60px;border:1px solid rgba(120,100,70,.18);display:flex;align-items:center;
    justify-content:center;cursor:pointer;transition:.22s;background:var(--panel);position:relative;
    border-radius:9px;box-shadow:0 2px 9px -5px rgba(120,100,70,.4)}
  .chip:hover{border-color:rgba(47,158,134,.5);transform:translateY(-3px);box-shadow:0 7px 15px -7px rgba(120,100,70,.5)}
  .chip.on{border-color:var(--ok);box-shadow:0 0 0 2px rgba(47,158,134,.22),0 6px 16px -7px rgba(47,158,134,.55)}
  .chip.used{opacity:.3;pointer-events:none}
  .chip svg{width:64%;height:64%}

  /* ---- 倒计时 ---- */
  .ring{width:54px;height:54px;margin:0 auto 14px;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:17px;color:var(--dim);letter-spacing:.05em}

  .stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;margin:24px 0}
  .stat .v{font-size:29px;color:var(--ink);letter-spacing:.04em}
  .stat .v.warn{color:var(--plant)} .stat .v.good{color:var(--ok)} .stat .v.bad{color:var(--bad)}
  .stat .k{font-size:11px;color:var(--faint);letter-spacing:.14em;margin-top:6px}
  .legend{font-size:11px;color:var(--faint);letter-spacing:.1em;display:flex;gap:18px;
    justify-content:center;flex-wrap:wrap;margin-top:12px}
  .legend i{font-style:normal}
  .legend .a{color:var(--ok)} .legend .b{color:var(--plant)} .legend .c{color:var(--bad)}
  .verdict{border-left:2px solid rgba(221,122,52,.5);padding:20px 22px;text-align:left;color:#5a5347;
    background:linear-gradient(90deg,rgba(221,122,52,.09),rgba(221,122,52,0) 72%);border-radius:0 6px 6px 0;
    font-size:15.5px;line-height:2.15;letter-spacing:.05em}
  .study{display:block;margin-top:16px;padding-top:13px;border-top:1px solid rgba(90,70,45,.14);
    font-size:12.5px;line-height:1.95;color:#94897a;letter-spacing:.04em}
  .pair{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
  @media(max-width:760px){.pair{grid-template-columns:1fr}}
  .pair h3{font-weight:400;font-size:11px;letter-spacing:.22em;color:var(--faint);margin-bottom:10px}
  #top{position:fixed;top:0;left:0;right:0;z-index:3;display:flex;justify-content:space-between;
    padding:18px 26px;font-size:11px;letter-spacing:.18em;color:var(--faint);pointer-events:none}
  .ticks{display:flex;gap:6px;align-items:center}
  .tick{width:16px;height:1px;background:rgba(90,75,55,.18)}
  .tick.on{background:var(--ink)} .tick.past{background:rgba(90,75,55,.42)}
  #top{pointer-events:none}
  #top>*{pointer-events:auto}
  .top-right{display:flex;align-items:center;gap:8px}
  .top-link,
  #langbtn{background:none;border:1px solid rgba(120,110,95,.26);box-shadow:none;padding:5px 10px;
    font-size:11px;letter-spacing:.14em;color:var(--faint);cursor:pointer;border-radius:999px}
  .top-link:hover,
  #langbtn:hover{color:var(--ink);border-color:rgba(67,61,52,.4);background:rgba(255,255,255,.46);transform:none}
</style>
</head>
<body>
<div id="vig"></div>
<div id="top">
  <span id="topname"></span>
  <span class="ticks" id="ticks"></span>
  <div class="top-right">
    <button id="mapbtn" class="top-link">脑网络地图</button>
    <button id="srcbtn" class="top-link">参考来源</button>
    <button id="langbtn">EN</button>
  </div>
</div>
<div id="stage"></div>

<script>
/* ============================================================
   房间 — 原型（无文本输入）
   记忆不是回放，是重建。而重建出来的那间屋子，比原来好看。
   零 LLM：场景、诱饵、诱导提问、比对全是确定性的。
   ============================================================ */

/* ---------- 物件（填色插画）---------- */
const rc=(x,y,w,h,f,r=2.5)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${r}" fill="${f}"/>`;
const ci=(x,y,r,f)=>`<circle cx="${x}" cy="${y}" r="${r}" fill="${f}"/>`;
const pa=(d,f)=>`<path d="${d}" fill="${f}"/>`;
const ln=(d,c,w=2)=>`<path d="${d}" fill="none" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>`;
const OBJ = {
  cup:  {n:"杯子",  en:"cup",    s:()=>ln("M26 21c5 0 5 8 0 8","#5f8fc8",3)+rc(10,15,17,15,"#7aa7d6",4)+rc(10,15,17,4.5,"#9cc0e8",3)},
  lamp: {n:"台灯",  en:"lamp",   s:()=>pa("M13 21 L20 9 L27 21 Z","#edc879")+pa("M13 21 L27 21 L25 23 L15 23 Z","#dcae5b")+rc(19,23,2,9,"#b6934e")+rc(13.5,32,13,3,"#a6853f",1.5)},
  plant:{n:"绿植",  en:"plant",  s:()=>pa("M20 25c-1-8-7-11-12-11 0 7 5 12 12 12z","#8caf7e")+pa("M20 25c1-6 6-9 11-9 0 6-5 10-11 10z","#a3c197")+pa("M14.5 25 h11 l-1.6 10 h-7.8 z","#cf8b5e")+rc(14,24,12,2.5,"#b9744a",1.2)},
  clock:{n:"闹钟",  en:"clock",  s:()=>ci(13,11,3,"#c9806f")+ci(27,11,3,"#c9806f")+ci(20,22,12,"#d98c7d")+ci(20,22,9,"#f4ead9")+ln("M20 22 V16","#4a443b",2)+ln("M20 22 l4.5 2.5","#4a443b",2)+ci(20,22,1.3,"#4a443b")},
  frame:{n:"相框",  en:"framed picture", s:()=>rc(9,10,22,22,"#c2a06f",3)+rc(12.5,13.5,15,15,"#bcd9e0",1.5)+pa("M12.5 28.5 l5.5-6.5 4 4.5 3-3.5 4 5.5 z","#8fb58a")+ci(24.5,18,2.4,"#f0c96b")},
  book: {n:"红书",  en:"red book", s:()=>rc(12,9,16,24,"#cc6a5f",2)+rc(12,9,4,24,"#af524a",1.5)+rc(18,14,7,1.7,"#f2e8d6",1)+rc(18,17.5,5.5,1.7,"#f2e8d6",1)},
  radio:{n:"收音机",en:"radio",  s:()=>rc(7,14,26,17,"#a99a6f",3)+rc(9.5,16.5,11,12,"#8a7c56",2)+ci(26,20,4.6,"#6f6444")+ci(26,20,2,"#544a30")+rc(23.5,25,5,2.5,"#e7dcbe",1)+rc(11.5,18.5,7,1.6,"#cabf98",1)+rc(11.5,21.5,7,1.6,"#cabf98",1)},
  keys: {n:"钥匙",  en:"keys",   s:()=>ci(14,20,5.2,"#cdb45f")+ci(14,20,2.1,"#f2ead0")+rc(18,18.5,15,3,"#cdb45f",1.5)+rc(28,21.5,2.6,4,"#cdb45f",1)+rc(31.5,21.5,2.4,3,"#cdb45f",1)},
  vase: {n:"花瓶",  en:"vase",   s:()=>ln("M20 13 V6","#7fb58a",2)+ci(20,5,2.6,"#e08a9a")+ci(17.5,7,2,"#e6a0ac")+ci(22.5,7,2,"#e6a0ac")+pa("M16 14 h8 v3 c3.4 2.6 4 6 4 9 a8 8 0 0 1-16 0 c0-3 0.6-6.4 4-9 z","#8fb6bb")+rc(15.5,12,9,3,"#7ba4a9",1.5)},
  // 以下不在原始房间里 —— 托盘里的诱饵
  glass:{n:"眼镜",  en:"glasses", s:()=>ci(14,22,5,"#8a94a0")+ci(14,22,3.4,"#dbe7ee")+ci(26,22,5,"#8a94a0")+ci(26,22,3.4,"#dbe7ee")+ln("M18.7 21 h2.6","#8a94a0",1.8)+ln("M9.2 20.5 l1-2","#8a94a0",1.8)+ln("M30.8 20.5 l-1-2","#8a94a0",1.8)},
  candle:{n:"蜡烛", en:"candle", s:()=>pa("M20 9.5c-1.6-1.6-1-3.2 0-4.8 1 1.6 1.6 3.2 0 4.8z","#ffd27a")+pa("M20 17c-3-3-2-6.4 0-9.6 2 3.2 3 6.6 0 9.6z","#f5a24d")+rc(16,17,8,15,"#ecdfb9",2)+rc(16,17,8,3,"#f6eccf",1.5)+rc(14.5,31,11,3,"#c9b98f",1.5)},
  bottle:{n:"瓶子", en:"bottle", s:()=>pa("M17 8 h6 v5 c3 2 4 5 4 9 v8 a2 2 0 0 1-2 2 h-10 a2 2 0 0 1-2-2 v-8 c0-4 1-7 4-9 z","#8bab7a")+rc(17.3,6.5,5.4,2.5,"#77986a",1)+rc(15.5,20,9,5.5,"#eef3e6",1.5)},
  sciss:{n:"剪刀",  en:"scissors", s:()=>ln("M14 29 L27 12","#aeb4bc",2.8)+ln("M26 29 L13 12","#aeb4bc",2.8)+ci(13.5,29.5,3.3,"#d98c7d")+ci(13.5,29.5,1.4,"#f4ead9")+ci(26.5,29.5,3.3,"#7fa8c4")+ci(26.5,29.5,1.4,"#f4ead9")+ci(20,20.5,1.5,"#8a9098")},
  mirror:{n:"镜子", en:"mirror", s:()=>pa("M20 8 a8 10 0 1 1 0 20 a8 10 0 1 1 0-20 z","#cdb45f")+pa("M20 11 a5.4 7.4 0 1 1 0 14.8 a5.4 7.4 0 1 1 0-14.8 z","#d3e3e9")+pa("M17 13 a4 6 0 0 1 3-2","#eef6f8")+rc(19,27.5,2,6,"#cdb45f",1)},
  hat:  {n:"帽子",  en:"hat",    s:()=>rc(7,23,26,3.6,"#9c8160",2)+pa("M13 24 c0-9 2-13 7-13 s7 4 7 13 z","#b0946f")+rc(13,20,14,2.6,"#8a7053",1)}
};
// 漫画墨线：根节点统一描边，paint-order:stroke 让填色压在描边上 → 只留干净外轮廓
const svg = id => `<svg viewBox="0 0 40 40" stroke="#3a3125" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" paint-order="stroke">${OBJ[id]?OBJ[id].s():""}</svg>`;
const nm  = id => L==="zh" ? OBJ[id].n : OBJ[id].en;      // 物件名，跟随当前语言

/* ---------- 场景：15 格（5×3），9 件东西 ---------- */
const SCENE = {0:"vase", 2:"clock", 4:"frame", 5:"lamp", 7:"radio", 9:"plant", 10:"cup", 11:"book", 13:"keys"};
const SLOTS = 15;
const TRAY  = ["cup","lamp","plant","clock","frame","book","radio","keys","vase",
               "glass","candle","bottle","sciss","mirror","hat"];

// 「另一个在场的人」记得的版本：闹钟挪了位，还多出一支蜡烛
const OTHER = {...SCENE};
delete OTHER[2]; OTHER[1]="clock"; OTHER[8]="candle";
const IMPLANT  = "candle";   // 诱导提问植入
const IMPLANT2 = "mirror";   // 想象膨胀植入

// 每一轮，你手里的房间更暖一点。真相其实是被抽干了暖意的灰。
const WARMTH = ["none",
                "saturate(1.16) brightness(1.03) sepia(.12)",
                "saturate(1.34) brightness(1.05) sepia(.30)"];
// 真相不是「发灰发暗」，是「比记忆少一点滤镜」——插画本身的颜色还得站得住
const COLD   = "saturate(.74) brightness(1.03) hue-rotate(-3deg)";

/* ---------- 语言 ---------- */
let L = window.__MEMORY_GAME_LANG || localStorage.getItem("room-lang") || (/^zh/i.test(navigator.language||"") ? "zh" : "en");
const X = () => TXT[L];
const CONTINUE_PATH = window.__MEMORY_GAME_CONTINUE_PATH || "/scene/default-mode-network";

const navTo = path => {
  if (typeof window.__MEMORY_GAME_NAVIGATE === "function") {
    window.__MEMORY_GAME_NAVIGATE(path);
    return;
  }
  window.location.href = path;
};

const continueToNextScene = () => navTo(CONTINUE_PATH);

const TXT = {
zh: {
  langBtn:"EN",
  mapLabel:"脑网络地图",
  sourcesLabel:"参考来源",
  steps:["看一眼","第一次重建","别人的说法","第二次重建","想象一下","一个问题","第三次重建","对照"],

  proTitle:"房 间",
  proQuote:"你会看见一间屋子，十二秒。<br><br>然后它会消失，而你要把它重新摆出来。<br>三次。<br><br>中间不会再让你看第二眼。",
  proBody:"这里没有一个字需要你输入。<br>所有的证据都会由你的手做出来。<br>先建起来，再倒回去——<br>你会看清中间差了多少。",
  proBtn:"推 门 进 去",

  studyH2:"记住这间屋子",
  studyHint:"东西是什么、在哪一格 —— 两样都要记",

  buildTitles:["现在，把它摆回来","再摆一次","最后一次"],
  buildBodies:[
    "点一件东西，再点一个格子。<br>点已经摆好的东西可以拿下来。",
    "不看上一次摆的，也不看原图。<br>就按你现在记得的样子摆。",
    "还是老规矩：想到什么摆什么。"
  ],

function marks(i){
  S.step=i;
  const steps=X().steps;
  $("topname").textContent = i>=0 ? (steps[i]||"") : "";
  const b=$("ticks"); b.innerHTML="";
  steps.forEach((_,k)=>{
    const d=document.createElement("div");
    d.className="tick"+(k<i?" past":k===i?" on":"");
    b.appendChild(d);
  });
  $("langbtn").textContent = X().langBtn;
  $("mapbtn").textContent = X().mapLabel;
  $("srcbtn").textContent = X().sourcesLabel;
}

function setLang(next, syncApp=true){
  if(next===L) return;
  L=next; localStorage.setItem("room-lang",L);
  document.documentElement.lang = L==="zh" ? "zh-CN" : "en";
  window.__MEMORY_GAME_LANG = L;
  if(syncApp && typeof window.__MEMORY_GAME_SET_APP_LANG === "function") {
    window.__MEMORY_GAME_SET_APP_LANG(L);
  }
  reset();
}

// 两块搁板横在行间；顶排/中排落在板上，底排搁在柜底
const SHELVES = [33.333, 66.666];

// 把一个「格子→物件」的映射画成房间
function roomHTML(map, {cls="", filter="none", marksMap=null, tags=false}={}){
  let cells="";
  for(let i=0;i<SLOTS;i++){
    const id=map[i];
    const mk=marksMap && marksMap[i] ? " mk-"+marksMap[i] : "";
    cells += `<div class="slot${mk}" data-i="${i}">`
           + (id ? svg(id) + (tags?`<span class="tag">${nm(id)}</span>`:"") : "")
           + `</div>`;
  }
  const shelves = SHELVES.map(t=>`<div class="shelf" style="top:${t}%"></div>`).join("");
  const backdrop = `<div class="floor"></div><div class="art"></div>`;   // 木地板 + 墙上风景画
  return `<div class="room ${cls}" id="room" style="filter:${filter}">${backdrop}${shelves}${cells}</div>`;
}

function scrBuild(){
  const r=S.round;
  marks([1,3,6][r]);
  const placed={};
  let armed=null;

  show(`
    <h2>${X().buildTitles[r]}</h2>
    <p>${X().buildBodies[r]}</p>
    <div class="sp-s"></div>
    ${roomHTML(placed,{cls:"build",filter:WARMTH[r]})}
    <div class="tray" id="tray">
      ${TRAY.map(id=>`<div class="chip" data-id="${id}">${svg(id)}</div>`).join("")}
    </div>
    <div class="sp-s"></div>
    <div class="row"><button id="done" disabled>${X().doneBtn}</button></div>
    <div class="hint" id="cnt">${X().cnt(0)}</div>
  `, true);

  const chips=[...el.querySelectorAll(".chip")];
  const slots=[...el.querySelectorAll(".slot")];
  const sync=()=>{
    const used=new Set(Object.values(placed));
    chips.forEach(c=>c.classList.toggle("used", used.has(c.dataset.id)));
    const n=Object.keys(placed).length;
    $("cnt").textContent=X().cnt(n);
    $("done").disabled = n<4;
  };
  const disarm=()=>{ chips.forEach(c=>c.classList.remove("on"));
                     slots.forEach(s=>s.classList.remove("armed")); armed=null; };

  chips.forEach(c=>c.onclick=()=>{
    if(c.classList.contains("used")) return;
    const was=armed===c.dataset.id; disarm();
    if(!was){ armed=c.dataset.id; c.classList.add("on"); slots.forEach(s=>{ if(!placed[s.dataset.i]) s.classList.add("armed"); }); }
  });
  slots.forEach(s=>s.onclick=()=>{
    const i=s.dataset.i;
    if(placed[i]){ delete placed[i]; s.innerHTML=""; disarm(); sync(); return; }
    if(!armed) return;
    placed[i]=armed; s.innerHTML=svg(armed); disarm(); sync();
  });
  $("done").onclick=()=>{
    S.rounds[r]={...placed};
    if(r===0) return scrOther();
    if(r===1) return scrImagine();
    scrCompare();
  };
}

/* ---------- 比对 ---------- */
function judge(mine){
  const m={}, mineIds=Object.values(mine);
  let right=0, moved=0, invented=0, lost=0, fromOther=0;
  for(let i=0;i<SLOTS;i++){
    const truth=SCENE[i], got=mine[i];
    if(got && truth===got){ m[i]="ok"; right++; }
    else if(got && Object.values(SCENE).includes(got)){ m[i]="move"; moved++; }
    else if(got){ m[i]="new"; invented++; if(OTHER[i]===got||got===IMPLANT) fromOther++; }
    else if(truth){ m[i]="lost"; lost++; }
  }
  return {m, right, moved, invented, lost, fromOther,
          implanted: mineIds.includes(IMPLANT),
          imagined:  mineIds.includes(IMPLANT2)};
}
const drift = (a,b) => {           // 两轮之间自己改了多少格
  let d=0;
  for(let i=0;i<SLOTS;i++) if((a[i]||"")!==(b[i]||"")) d++;
  return d;
};

function scrCompare(){
  marks(7);
  const last=S.rounds[2], J=judge(last);
  const self=drift(S.rounds[0],S.rounds[2]);
  const total=Object.keys(SCENE).length;
  const t=X();

  show(`
    <h2>${t.compareH2}</h2>
    <div style="max-width:620px;margin:0 auto">${roomHTML(last,{filter:WARMTH[2],marksMap:J.m})}</div>
    <div class="legend">${t.legend}</div>
    <div class="stats">
      <div class="stat"><div class="v ${J.right>total/2?"good":"bad"}">${J.right}/${total}</div><div class="k">${t.statRight}</div></div>
      <div class="stat"><div class="v warn">${J.invented}</div><div class="k">${t.statInv}</div></div>
      <div class="stat"><div class="v">${J.lost}</div><div class="k">${t.statLost}</div></div>
      <div class="stat"><div class="v ${self?"warn":""}">${self}</div><div class="k">${t.statSelf}</div></div>
    </div>
    <div class="verdict">
      ${t.verdict(J, S.answered)}
      <span class="study">${t.compareStudy}</span>
    </div>
    <div class="sp"></div>
    <button id="go">${t.goRewind}</button>
  `, true);
  $("go").onclick=scrRewind;
}

/* --- 结尾 · 倒带：这是唯一一次真的往回走 ---
   前半程你向前把屋子建起来（写入），这后半程把它一层层剥回原点。
   两幕互为逆运算——reverse 在这里是字面的，能看见的。 */
function scrRewind(){
  marks(-1);
  const final=S.rounds[2];
  const t=X();

  // 从「你记得的」到「真相」的逆向编辑，按类别分三拍，永远精确落回原图
  const invented=[], misplaced=[], restore=[];
  for(let i=0;i<SLOTS;i++){
    const truth=SCENE[i], got=final[i];
    const real = got && Object.values(SCENE).includes(got);
    if(got && !real) invented.push(i);
    else if(got && truth!==got) misplaced.push(i);
    if(truth && final[i]!==truth) restore.push(i);
  }

  show(`
    <h2>${t.rewindH2}</h2>
    <div style="max-width:640px;margin:0 auto">${roomHTML(final,{filter:WARMTH[2]})}</div>
    <div class="rwcap" id="cap">${t.rewindStart}</div>
    <div class="sp-s"></div>
    <div class="row"><button class="ghost" id="skip">${t.skipBtn}</button></div>
  `, true);

  const room = ()=>$("room");
  const slot = i=>el.querySelector(`.slot[data-i="${i}"]`);
  const cap  = txt=>{ const c=$("cap"); if(c) c.innerHTML=txt; };
  let done=false;

  const clearSlots=(arr,cb)=>{
    arr.forEach(i=>{ const s=slot(i); if(s) s.classList.add("clr"); });
    setTimeout(()=>{ arr.forEach(i=>{ const s=slot(i); if(s){ s.innerHTML=""; s.classList.remove("clr"); } }); cb&&cb(); },560);
  };
  const addSlots=(arr,cb)=>{
    arr.forEach(i=>{ const s=slot(i); if(s){ s.innerHTML=svg(SCENE[i]); s.classList.add("clr"); } });
    requestAnimationFrame(()=>arr.forEach(i=>{ const s=slot(i); if(s) s.classList.remove("clr"); }));
    setTimeout(cb,700);
  };
  const setF=(f,cb,ms)=>{ if(room()) room().style.filter=f; setTimeout(cb,ms||900); };
  const finalCap = t.rewindFinal;

  const seq=[];
  if(invented.length){
    const invNames = invented.map(i=>nm(final[i])).join(t.join);
    const src=[];
    if(invented.some(i=>final[i]===IMPLANT))  src.push(t.rewindSrcCandle);
    if(invented.some(i=>final[i]===IMPLANT2)) src.push(t.rewindSrcMirror);
    const srcTxt = src.length ? `<br>${src.join(L==="zh"?"；":"; ")}${L==="zh"?"。":"."}` : "";
    seq.push(cb=>{ cap(t.rewindInvented(invNames, srcTxt)); clearSlots(invented,cb); });
  }
  if(misplaced.length) seq.push(cb=>{ cap(t.rewindMisplaced); clearSlots(misplaced,cb); });
  if(restore.length)  seq.push(cb=>{ cap(t.rewindRestore); addSlots(restore,cb); });
  seq.push(cb=>{ cap(t.rewindColor); setF(WARMTH[1],cb); });
  seq.push(cb=>{ setF(WARMTH[0],cb); });
  seq.push(cb=>{ cap(finalCap); setF(COLD,cb,1500); });

  let k=0;
  const run=()=>{ if(done) return; if(k>=seq.length) return scrThesis();
                  seq[k++](()=>setTimeout(run,700)); };
  setTimeout(run,1300);

  $("skip").onclick=()=>{
    done=true;
    for(let i=0;i<SLOTS;i++){ const s=slot(i); if(s) s.innerHTML = SCENE[i]?svg(SCENE[i]):""; }
    if(room()) room().style.filter=COLD;
    cap(finalCap);
    setTimeout(scrThesis,1100);
  };
}

/* --- 题眼：两个相反的方向 --- */
function scrThesis(){
  marks(-1);
  const t=X();
  show(`
    <h2>${t.thesisH2}</h2>
    <div class="pair">
      <div><h3>${t.thBuilt}</h3>${roomHTML(S.rounds[2],{filter:WARMTH[2]})}</div>
      <div><h3>${t.thTruth}</h3>${roomHTML(SCENE,{filter:COLD})}</div>
    </div>
    <div class="sp"></div>
    <div class="verdict">
      ${t.thesisVerdict}
      <span class="study">${t.thesisStudy}</span>
    </div>
    <div class="sp"></div>
    <p class="quote">${t.thesisQuote}</p>
    <div class="sp"></div>
    <div class="row">
      <button id="again">${t.againBtn}</button>
      <button class="ghost" id="keep">${t.keepBtn}</button>
      <button id="continue">${t.continueBtn}</button>
    </div>
  `, true);
  $("again").onclick=reset;
  $("continue").onclick=continueToNextScene;
  $("keep").onclick=()=>{
    show(`
      <h2>${t.keepH2}</h2>
      <p class="quote">${t.keepQuote}</p>
      <div class="sp"></div>
      <div class="row">
        <button class="ghost" id="again2">${t.againBtn}</button>
        <button id="continue2">${t.continueBtn}</button>
      </div>
    `);
    $("again2").onclick=reset;
    $("continue2").onclick=continueToNextScene;
  };
}

function reset(){ S.rounds=[]; S.round=0; S.answered=null; S.imgShape=null; S.imgFrame=null; scrPrologue(); }

/* ---------- 启动 ---------- */
document.documentElement.lang = L==="zh" ? "zh-CN" : "en";
$("mapbtn").onclick = ()=>navTo("/map");
$("srcbtn").onclick = ()=>navTo("/sources");
$("langbtn").onclick = ()=>setLang(L==="zh"?"en":"zh");
window.__MEMORY_GAME_API = {
  setLang: next => setLang(next, false),
  destroy: () => {
    // no-op hook for host cleanup symmetry
  }
};
scrPrologue();
document.addEventListener("keydown",e=>{
  if(e.key==="s"&&S._skip){ S._skip(); S._skip=null; return; }   // 调试：跳过读秒
  if(e.key==="Enter"){ const b=el.querySelector("button:not(:disabled)"); if(b) b.click(); }
});
</script>
